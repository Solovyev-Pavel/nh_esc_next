mod_job_esc_dark_matter_shaper_add: "$job_esc_dark_matter_shaper$"
job_esc_dark_matter_shaper_desc: "Specialists who work at the very edge of known physics, drawing £sr_dark_matter£ §Y$sr_dark_matter$§! from a captive singularity to fuel our Empire's ambitions."

