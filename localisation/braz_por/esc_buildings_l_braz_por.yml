job_esc_nanite_breeder_desc: "Specialists who tend the Nanite Foundry's breeding vats, guaranteeing our Empire a steady supply of usable £nanites£ §Y$nanites$§!."

job_esc_nanite_breeder_drone: "Nanite Breeding Drone"
job_esc_nanite_breeder_drone_plural: "Nanite Breeding Drones"
mod_job_esc_nanite_breeder_drone_add: "$job_esc_nanite_breeder_drone$"
job_esc_nanite_breeder_drone_desc: "Complex drones that maintain the Nanite Foundry's breeding cycles, securing our Empire's access to usable £nanites£ §Y$nanites$§!."

