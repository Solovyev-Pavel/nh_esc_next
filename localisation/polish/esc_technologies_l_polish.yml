l_polish:

### POLISH LOCALIZATION
# currently copies English localization

############################################################
###                   Core Technologies                  ###
############################################################

esc_tech_grand_research_initiative: "Grand Research Initiative"
esc_tech_grand_research_initiative_desc: "Centuries of progress have pushed back the boundaries of the unknown, yet the deepest mysteries of the cosmos still elude us, and only a grand convergence of minds and resources can hope to breach them."
ESC_TECH_UNLOCK_ADV_RESEARCH_TITLE: "§HUnlocks§!: Advanced technologies and research avenues."
ESC_TECH_UNLOCK_ADV_RESEARCH_DESC: "$esc_tech_grand_research_initiative_desc$"
gateway_ESC_TECHNOLOGIES: "Advanced Technologies"

esc_tech_culture_nexus: "Advanced Socio-Biological Studies"
esc_tech_culture_nexus_desc: "The advancement of our empire demands a deeper understanding of how body and mind intertwine, and specialized centers for socio-biological study will bring that understanding within reach."

esc_tech_advanced_materials_lab: "Advanced Materials Laboratories"
esc_tech_advanced_materials_lab_desc: "Demand for materials with exotic and useful properties outpaces supply, and only dedicated laboratories will give our researchers the means to close that gap."

esc_tech_technology_institute: "Technology Institutes"
esc_tech_technology_institute_desc: "Specialized institutes devoted to pushing the frontiers of applied science will keep our empire at the vanguard of technological progress and improve the lives of all our citizens."

esc_tech_new_age_warfare: "New Age Warfare"
esc_tech_new_age_warfare_desc: "Securing our place on the galactic stage demands weapons that defy convention, and with them, a military doctrine bold enough to match."
ESC_TECH_UNLOCK_ADV_WEAPONS_TITLE: "§HUnlocks development of§!: Advanced weapon types."
ESC_TECH_UNLOCK_ADV_WEAPONS_DESC: "Our fleets require weapons of greater sophistication and deadliness if we are to maintain our power within the galaxy."
gateway_ESC_WEAPONS: "Advanced Weapons"

esc_tech_advanced_heavy_weapons: "Advanced Heavy Weapon Systems"
esc_tech_advanced_heavy_weapons_desc: "Spinal-mounted weapons have given our fleets firepower beyond anything previously conceived, and further development promises super-heavy armaments of staggering destructive force."
ESC_TECH_UNLOCK_ADV_HEAVY_WEAPONS_TITLE: "§HUnlocks development of§!: Advanced spinal-mounted weapons."
ESC_TECH_UNLOCK_ADV_HEAVY_WEAPONS_DESC: "Super-heavy spinal-mounted weapons of terrifying power for our warships."
gateway_ESC_SUPERHEAVY_WEAPONS: "Advanced Spinal-Mounted Weapons"

esc_tech_synthesis_tech_age: "Synthesis of Technological Ages"
esc_tech_synthesis_tech_age_desc: "Mere imitation of the ancients can only carry us so far. To truly surpass the precursor civilizations, we must marry their knowledge with the realities of our own era."
ESC_TECH_UNLOCK_ADV_ARCHEO_WEAPONS_TITLE: "§HUnlocks development of§!: Advanced archeotech weapons."
ESC_TECH_UNLOCK_ADV_ARCHEO_WEAPONS_DESC: "Development of advanced forms of archeotech weapons."
gateway_ESC_ARCHEOTECH_WEAPONS: "Advanced Archeotech Weapons"

esc_tech_gravity_manipulation: "Gravity Manipulation Techniques"
esc_tech_gravity_manipulation_desc: "Learning how to manipulate local gravity would transform both our industry and our warfare, for the force that builds worlds can just as easily tear them apart."
ESC_TECH_UNLOCK_GRAVITY_MANIPULATION_TITLE: "§HUnlocks development of§!: Gravity manipulation technologies."
ESC_TECH_UNLOCK_GRAVITY_MANIPULATION_DESC: "Bending one of nature's fundamental forces to serve our civilization marks the next great stride toward galactic supremacy."
gateway_ESC_GRAVITY_MANIPULATION: "Gravity Manipulation"

esc_tech_gravity_weapons: "Weaponized Gravity"
esc_tech_gravity_weapons_desc: "Gravity, once merely a law we obeyed, is now a weapon we command, and with it our ships will crush the opposition under forces their shields were never meant to withstand."
ESC_TECH_UNLOCK_GRAV_WEAPONS_TITLE: "§HUnlocks development of§!: Gravity-based weaponry."
ESC_TECH_UNLOCK_GRAV_WEAPONS_DESC: "Gravity-based weapons to tear the enemies of our Empire into space dust."
gateway_ESC_GRAVITIC_WEAPONS: "Gravitic Weapons"

esc_tech_advanced_materials: "Advanced Materials"
esc_tech_advanced_materials_desc: "Materials of extraordinary strength and versatility now stand within our grasp, promising feats our science once dismissed as impossible."
ESC_TECH_UNLOCK_ADV_MATERIALS_TITLE: "§HUnlocks development of§!: Advanced materials and nanotechnology."
ESC_TECH_UNLOCK_ADV_MATERIALS_DESC: "With these materials, what was once wishful thinking becomes achievable, and what was achievable becomes trivial."
gateway_ESC_MATERIALS: "Advanced Materials"

esc_tech_superconductors: "Superconducting Materials"
esc_tech_superconductors_desc: "Widespread adoption of high-temperature superconductors will virtually eliminate losses during energy transfer, freeing vast reserves of power for other uses."

esc_tech_neutronium_tools: "Neutronium-Coated Powertools"
esc_tech_neutronium_tools_desc: "An ultra-thin coating of Neutronium alloy renders our tools virtually immune to wear and tear, allowing mining operations to push far harder and deeper than before."

esc_tech_synthetic_lifeform_studies: "Synthetic Lifeform Studies"
esc_tech_synthetic_lifeform_studies_desc: "The creation and study of nanomachines will open possibilities that verge on the miraculous."
ESC_TECH_UNLOCK_NANITIES_TITLE: "§HUnlocks development of§!: Nanomaterial-based armors and weapons."
ESC_TECH_UNLOCK_NANITIES_DESC: "Purpose-built nanites operate with speed and precision that border on the supernatural. They can repair our ships down to the last rivet, or disassemble an enemy vessel atom by atom. Their potential is without limit."
gateway_ESC_NANITE_COMPONENTS: "Nanomaterial-Based Weapons and Armor"

esc_tech_psionic_weapons: "Psionic Weapons"
esc_tech_psionic_weapons_desc: "Now that we have proven beyond doubt that thought shapes reality, we must turn our psionic gifts toward forging weapons and defenses for the fleet."
ESC_TECH_UNLOCK_PSI_WEAPONS_TITLE: "§HUnlocks development of§!: Psionic weapons and components."
ESC_TECH_UNLOCK_PSI_WEAPONS_DESC: "Weapons fueled by the focused thoughts of our crews, turning sheer will into devastation against the enemies of our Empire."
gateway_ESC_PSIONIC_WEAPONS: "Psionic Weapons and Components"

esc_tech_biological_weapons: "Bio-Weapons"
esc_tech_biological_weapons_desc: "Our growing mastery over the secrets of life begs a dangerous question: can living organisms be turned into tools of war? Life always finds a way, and so might we."
ESC_TECH_UNLOCK_BIO_WEAPONS_TITLE: "§HUnlocks development of§!: Biological armors and weapons."
ESC_TECH_UNLOCK_BIO_WEAPONS_DESC: "Specialized weapons and armors for our fleets that are part living beings."
gateway_ESC_BIOLOGICAL_WEAPONS: "Biological Weapons and Armor"

esc_tech_tesla_weapons: "Tesla Weapons"
esc_tech_tesla_weapons_desc: "Next-generation superconductors can generate lightning blasts that arc through the vacuum of space itself. With some ingenuity, this phenomenon becomes a devastating weapon of space combat."
ESC_TECH_UNLOCK_TESLA_WEAPONS_TITLE: "§HUnlocks development of§!: Tesla weapons."
ESC_TECH_UNLOCK_TESLA_WEAPONS_DESC: "Pure energy directed as lightning blasts through tesla coils should be an effective weapon against enemy ships."
esc_tech_tesla_weapons_bio: "Bio-electric Weapons"
esc_tech_tesla_weapons_bio_desc: "Nature has already proven the viability of bio-electric weapons in countless predator species. With the right bio-technological augmentation, these natural armaments can be scaled to devastating effect in our warbeasts."
ESC_TECH_UNLOCK_TESLA_WEAPONS_BIO_TITLE: "§HUnlocks development of§!: Bio-electric weapons."
ESC_TECH_UNLOCK_TESLA_WEAPONS_BIO_DESC: "Pure energy directed as lightning blasts through biotechnological means should be an effective weapon against enemy ships."
gateway_ESC_TESLA_WEAPONS: "Tesla Weapons"

esc_tech_spacetime_manipulation: "Time-Space Continuum Manipulation"
esc_tech_spacetime_manipulation_desc: "The power to warp reality itself beckons, promising scientific achievements that would stagger even the boldest imaginations."
ESC_TECH_UNLOCK_REALITY_ALTER_TITLE: "§HUnlocks development of§!: Reality-bending technologies."
ESC_TECH_UNLOCK_REALITY_ALTER_DESC: "The power to bend reality itself to our will, making the impossible merely a matter of intent."
gateway_ESC_SPACETIME_TECH: "Time-Space Manipulation Technologies"

esc_tech_chrono_spatial_weapons: "Weaponized Reality Warping"
esc_tech_chrono_spatial_weapons_desc: "Our newfound ability to twist reality itself opens the door to weapons of terrifying destructive potential."
gateway_ESC_CHRONOSPATIAL_WEAPONS: "Chrono-Spatial Weapons"

esc_tech_watcher_of_eternity: "Watchers of Eternity"
esc_tech_watcher_of_eternity_desc: "By bending the fabric of reality we can peer into the past and distant future alike, witnessing the very events that shape our universe and gleaning truths no conventional science could reveal."

esc_tech_phase_shifted_ammunition: "Phase-Shifted Ammunition"
esc_tech_phase_shifted_ammunition_desc: "Ammunition that briefly shifts through the space-time continuum can bypass even the most formidable defenses as though they were not there."

esc_tech_time_dilation_chambers: "Time-Dilation Chambers"
esc_tech_time_dilation_chambers_desc: "Though we cannot yet grant extra time to all, we can slow its passage for those who need it most, a gift of immeasurable value to our empire's greatest minds."

############################################################
###         Required Ship Components Technologies        ###
############################################################

# reactors
esc_tech_reactor_6: "Improved Zero-Point Reactors"
esc_tech_reactor_6_desc: "Advances in miniaturization have produced a new generation of zero-point reactors that extract far more energy from far less space."
esc_tech_reactor_6_bio: "Improved Zero-Point Metabolism"
esc_tech_reactor_6_bio_desc: "Through selective breeding, we can develop a new strain of metabolic organs that draw far more zero-point energy from far less dark matter, giving our warbeasts a substantial power advantage."
ESC_TECH_UNLOCK_REACTOR_6_TITLE: "§HUnlocks components§!: Improved Zero-Point Reactor"
ESC_TECH_UNLOCK_REACTOR_6_DESC: "A Zero Point Reactor with improved energy extraction density."
gateway_ESC_REACTORS: "Ship Reactors"

esc_tech_reactor_7: "Singularity Reactors"
esc_tech_reactor_7_desc: "Refined extraction protocols for zero-point singularity yield reactors of greater output than anything preceding them, with no increase in mass or complexity to compromise the design."
esc_tech_reactor_7_bio: "Singularity Metabolism"
esc_tech_reactor_7_bio_desc: "Targeted bioengineering of the zero-point extraction metabolic pathway yields a new organ strain that surpasses all predecessors in raw energy output."
ESC_TECH_UNLOCK_REACTOR_7_TITLE: "§HUnlocks components§!: Singularity Reactor"
ESC_TECH_UNLOCK_REACTOR_7_DESC: "The next generation of Zero-Point Reactors that provides even greater amounts of energy."

esc_tech_reactor_8: "Improved Singularity Reactors"
esc_tech_reactor_8_desc: "Further miniaturization pushes the power ceiling of the standardized reactor package once again, producing Singularity Reactors that are both safer and more potent than any built before them."
esc_tech_reactor_8_bio: "Improved Singularity Metabolism"
esc_tech_reactor_8_bio_desc: "A precisely guided sequence of mutations transforms the zero-point metabolic organs into structures that supply our warbeasts with a near-limitless well of energy."
ESC_TECH_UNLOCK_REACTOR_8_TITLE: "§HUnlocks components§!: Improved Singularity Reactor"
ESC_TECH_UNLOCK_REACTOR_8_DESC: "An upgraded version of the Singularity Reactor that can produce an even greater amount of energy."

esc_tech_dark_matter_power_core_2: "Improved Dark Matter Reactors"
esc_tech_dark_matter_power_core_2_desc: "Refined channeling protocols coax far greater energy yields from the same dark matter reactors, pushing a formidable technology further still."
esc_tech_dark_matter_power_core_2_bio: "Improved Dark Matter Metabolism"
esc_tech_dark_matter_power_core_2_bio_desc: "A series of symbiotic mutations deepens the metabolic bond between warbeast and dark matter, drawing significantly greater energy from each interaction."
ESC_TECH_UNLOCK_DM_REACTOR_2_TITLE: "§HUnlocks components§!: Improved Dark Matter Reactor"
ESC_TECH_UNLOCK_DM_REACTOR_2_DESC: "An upgraded version of Dark Matter Reactor used by the precursor empires."

esc_tech_dark_matter_power_core_3: "Perfected Dark Matter Reactors"
esc_tech_dark_matter_power_core_3_desc: "A complete theoretical mastery of dark matter's nature permits the construction of reactors that fully realize its vast and terrifying energy potential."
esc_tech_dark_matter_power_core_3_bio: "Perfected Dark Matter Metabolism"
esc_tech_dark_matter_power_core_3_bio_desc: "Fusing specialized biopolymers into warbeast flesh transforms dark matter extraction into a perfected metabolic process, such that even minute quantities of dark matter satisfy the voracious energy demands of our entire fleet."
ESC_TECH_UNLOCK_DM_REACTOR_3_TITLE: "§HUnlocks components§!: Perfected Dark Matter Reactor"
ESC_TECH_UNLOCK_DM_REACTOR_3_DESC: "The perfected dark matter reactor design."

esc_tech_reactor_psionic: "Shroud Well"
esc_tech_reactor_psionic_desc: "The §MShroud§! is a nigh-limitless wellspring of psionic energy, and with the right techniques, that vast power can be converted into conventional forms to fuel every system aboard our ships."
ESC_TECH_UNLOCK_PSI_REACTOR_TITLE: "§HUnlocks components§!: Shroud Well"
ESC_TECH_UNLOCK_PSI_REACTOR_DESC: "§MShroud§! can be a nigh-limitless source of psionic energies. We would be fools not to use it."

# combat computers
esc_tech_dreadnought_computer: "Automated Dreadnought Combat Algorithms"
esc_tech_dreadnought_computer_desc: "The Automated Dreadnought stood its vigil for millennia, defeating fleets and admirals alike without a living crew to guide it, and reverse-engineering its combat protocols promises to imbue our own warships with that same uncanny lethality."
ESC_TECH_UNLOCK_DREADNOUGHT_COMPUTER_TITLE: "§HUnlocks component§!: Automated Dreadnought Protocols combat computers"
ESC_TECH_UNLOCK_DREADNOUGHT_COMPUTER_DESC: "Combat computers based on the observed behavioral logic of the ancient Automated Dreadnought."

esc_tech_nanite_thought_matrix: "Nanite Thought Matrix"
esc_tech_nanite_thought_matrix_desc: "An artificial intelligence built on a nanite substrate that replicates the architecture of a living brain could match even the most intuitive quirks of organic cognition, a mind of extraordinary capability precisely where split-second decisions mean victory or death."
ESC_TECH_UNLOCK_COMBAT_COMPUTERS_NANITE_TITLE: "§HUnlocks components§!: $esc_tech_nanite_thought_matrix$ combat computers"
ESC_TECH_UNLOCK_COMBAT_COMPUTERS_NANITE_DESC: "Artificial intelligence running on a nanite substrate imitating an actual brain is theoretically capable of mimicking even the most unusual quirks of a living mind, giving it unprecedented capability in split-second combat decisions."

esc_tech_gigapredator_instincts: "Gigapredator Instincts"
esc_tech_gigapredator_instincts_desc: "The spaceborne leviathans have spent ages evolving instincts that make them virtually unkillable, and our researchers have found a way to implant a faithful imitation of those instincts into the warbeasts under our command."
ESC_TECH_UNLOCK_GIGAPREDATOR_TITLE: "§HUnlocks component§!: Gigapredator Instincts Neural Implants"
ESC_TECH_UNLOCK_GIGAPREDATOR_DESC: "Neural implants implementing behavioral adaptations of the cosmos's biggest and strongest predators."

# sensors
esc_tech_sensors_5: "Improved Tachyon Sensors"
esc_tech_sensors_5_desc: "Refinements to the tachyon sensor array extend its detection range and resolution well beyond what the previous generation could achieve."
ESC_TECH_UNLOCK_ADV_TACHYON_SENSOR_TITLE: "§HUnlocks components§!: Improved Tachyon Sensors"
ESC_TECH_UNLOCK_ADV_TACHYON_SENSOR_DESC: "$esc_tech_sensors_5_desc$"

esc_tech_sensors_6: "String Theory"
esc_tech_sensors_6_desc: "String theory has given us a framework for phenomena once considered entirely inexplicable, and the sensor applications of that understanding may prove to be among the most valuable we have ever developed."
ESC_TECH_UNLOCK_STRING_SENSOR_TITLE: "§HUnlocks components§!: Dimensional String Sensors"
ESC_TECH_UNLOCK_STRING_SENSOR_DESC: "$esc_tech_sensors_6_desc$"

esc_tech_sensors_7: "String Fluctuation Analysis"
esc_tech_sensors_7_desc: "True mastery of string theory reveals the hidden structure underlying all of reality, and the sensors built on this knowledge perceive the universe with a clarity nothing before them could approach."
ESC_TECH_UNLOCK_ADV_STRING_SENSOR_TITLE: "§HUnlocks components§!: Improved String Sensors"
ESC_TECH_UNLOCK_ADV_STRING_SENSOR_DESC: "$esc_tech_sensors_7_desc$"

esc_tech_sensors_psionic: "Psionic Sensors"
esc_tech_sensors_psionic_desc: "Psionic influence over dimensional strings grants a depth of perception that no physical sensor can replicate, reaching out across the cosmos with the full weight of a trained mind behind it."
ESC_TECH_UNLOCK_PSI_SENSOR_TITLE: "§HUnlocks components§!: Psionic Sensors"
ESC_TECH_UNLOCK_PSI_SENSOR_DESC: "$esc_tech_sensors_psionic_desc$"

esc_tech_sensors_precursor: "Precursor Sensor Arrays"
esc_tech_sensors_precursor_desc: "Advanced sensor arrays utilizing arcane properties of £sr_dark_matter£ §Y$sr_dark_matter$§! to instantly locate entities across vast distances of the cosmos."
esc_tech_sensors_precursor_bio: "Precursor Warbeast Eye"
esc_tech_sensors_precursor_bio_desc: "Reverse-engineered precursor methods for manipulating £sr_dark_matter£ §Y$sr_dark_matter$§! allow us to transform the sensory organs of our warbeasts into instruments of perception capable of locating anything, anywhere across the cosmos."
ESC_TECH_UNLOCK_PRECURSOR_SENSOR_TITLE: "§HUnlocks components§!: $esc_tech_sensors_precursor$"
ESC_TECH_UNLOCK_PRECURSOR_SENSOR_DESC: "$esc_tech_sensors_precursor_desc$"

esc_tech_clairvoyancy_eyes_1: "Eye of Clairvoyancy"
esc_tech_clairvoyancy_eyes_1_desc: "Ancient legends tell of Heroes whose extraordinary eyes granted them sight far beyond mortal limits, and while our own species may lack the biological foundation for such gifts, the malleable genetic code of our ships is another matter entirely."
ESC_TECH_UNLOCK_CLAIVOYANCY_1_TITLE: "§HUnlocks components§!: $esc_tech_clairvoyancy_eyes_1$"
ESC_TECH_UNLOCK_CLAIVOYANCY_1_DESC: "$esc_tech_clairvoyancy_eyes_1_desc$"

esc_tech_clairvoyancy_eyes_2: "Superior Eye of Clairvoyancy"
esc_tech_clairvoyancy_eyes_2_desc: "The Eyes of Clairvoyancy proved themselves in practice, but there are researchers convinced the design still has room to grow, and the early projections for a superior variant are compelling."
ESC_TECH_UNLOCK_CLAIVOYANCY_2_TITLE: "§HUnlocks components§!: $esc_tech_clairvoyancy_eyes_2$"
ESC_TECH_UNLOCK_CLAIVOYANCY_2_DESC: "$esc_tech_clairvoyancy_eyes_2_desc$"

esc_tech_clairvoyancy_eyes_3: "God-eye"
esc_tech_clairvoyancy_eyes_3_desc: "The genetic code underlying the Eyes of Clairvoyancy shows unmistakable signs of wanting to mutate further into something our researchers cannot yet name, and they intend to find out exactly what lies at the end of that evolutionary path."
ESC_TECH_UNLOCK_CLAIVOYANCY_3_TITLE: "§HUnlocks components§!: $esc_tech_clairvoyancy_eyes_3$"
ESC_TECH_UNLOCK_CLAIVOYANCY_3_DESC: "$esc_tech_clairvoyancy_eyes_3_desc$"

# thrusters
esc_tech_thrusters_5: "Antimatter Thrusters"
esc_tech_thrusters_5_desc: "Matter-antimatter annihilation releases more energy per gram than any other reaction known to physics, and engines built around that principle will surpass everything that came before them."
esc_tech_thrusters_5_bio: "Antimatter-harnessing Propulsion Organs"
esc_tech_thrusters_5_bio_desc: "With the right suite of mutations to safely contain and channel antimatter, our warbeasts gain propulsion capabilities that place them in an entirely different class of speed and maneuverability."
ESC_TECH_UNLOCK_THRUSTERS_5_TITLE: "§HUnlocks components§!: Antimatter Thrusters"
ESC_TECH_UNLOCK_THRUSTERS_5_DESC: "$esc_tech_thrusters_5_desc$"

esc_tech_thrusters_6: "Gravity Manipulation Engines"
esc_tech_thrusters_6_desc: "Applying the principles of warp physics to sublight propulsion lets our ships bend their own local spacetime for thrust, achieving velocities that conventional reaction engines could never dream of."
esc_tech_thrusters_6_bio: "Gravity Manipulation Propulsion Organs"
esc_tech_thrusters_6_bio_desc: "Genetic engineering grants our warbeasts the ability to manipulate gravity directly for propulsion. They move with a speed no conventional engine can hope to match."
ESC_TECH_UNLOCK_THRUSTERS_6_TITLE: "§HUnlocks components§!: Gravity Manipulation Engines"
ESC_TECH_UNLOCK_THRUSTERS_6_DESC: "$esc_tech_thrusters_6_desc$"

# ftl drives
esc_tech_jump_drive_2: "Improved Jump Drive"
esc_tech_jump_drive_2_desc: "Maturing jump drive technology allows for refined designs with extended range and far better protection against the catastrophic stresses of tearing through the space-time continuum."
esc_tech_jump_drive_2_bio: "Improved Hyperdimensional Inner-Ear"
esc_tech_jump_drive_2_bio_desc: "A targeted sequence of mutations yields a new strain of organic jump drive with greater efficiency and the precision to deliver our warbeasts exactly where they need to be."

esc_tech_jump_drive_3: "Ultrahyperbolic Jump Drive"
esc_tech_jump_drive_3_desc: "Using normally-invisible higher dimensions as slingshot anchors extends the range and speed of our jump drives beyond anything previously possible, at a power cost that our reactor technology can meet with room to spare."
esc_tech_jump_drive_3_bio: "Ultrahyperbolic Inner-Ear"
esc_tech_jump_drive_3_bio_desc: "Giving our warbeasts the ability to anchor their jumps in higher-dimensional space extends their interstellar reach and cuts transit time to a fraction of what was possible before."

esc_tech_jump_drive_precursor: "Precursor Jump Drives"
esc_tech_jump_drive_precursor_desc: "The fruit of eons of precursor research, this jump drive represents a level of FTL mastery that younger civilizations spend lifetimes chasing and rarely reach."
esc_tech_jump_drive_precursor_bio: "Precursor Hyperdimensional Slipstream Vision"
esc_tech_jump_drive_precursor_bio_desc: "Drawing on precursor mastery of £sr_dark_matter£ §Y$sr_dark_matter$§! manipulation, we can engineer a mode of galactic transit into our warbeasts that renders every earlier organic drive design entirely obsolete."

esc_tech_psi_jump_drive_2: "Improved Psionic Jump Drive"
esc_tech_psi_jump_drive_2_desc: "Accumulated experience with psionic jump technology yields a drive of greatly extended range and far faster recharge. The technology has finally come into its own."
esc_tech_psi_jump_drive_2_bio: "Improved Psychically-enhanced Bio-drive"
esc_tech_psi_jump_drive_2_bio_desc: "Cultivating greater psionic potential in our warbeasts deepens their connection to the §MShroud§!, letting them pull themselves across the galaxy with a speed and confidence their earlier strains could not achieve."

esc_tech_psi_jump_drive_3: "Shroud Guide"
esc_tech_psi_jump_drive_3_desc: "The ancient denizens of the §MShroud§! navigate that unknowable dimension as naturally as we breathe, and the wisdom they share transforms the psionic jump drive into a perfected instrument of FTL travel."
esc_tech_psi_jump_drive_3_bio: "Symbiotic §MShroud§! Guide"
esc_tech_psi_jump_drive_3_bio_desc: "Specialized organs that bind our warbeasts to §MShroud§! entities brought into this reality allow them to navigate both normal space and the ever-mysterious §MShroud§! dimension with equal safety and confidence."

esc_tech_aura_mirage_system: "Titan Aura: Mirage System"
esc_tech_aura_mirage_system_desc: "By projecting convincing sensor phantoms of our ships at locations they do not occupy, we can reduce enemy targeting to little more than a costly guessing game."
ESC_TECH_UNLOCK_TITAN_AURA_MIRAGE: "§HUnlocks Titan Aura§!: Mirage System"
ESC_TECH_UNLOCK_TITAN_AURA_MIRAGE_DESC: "$esc_tech_aura_mirage_system_desc$"

esc_tech_aura_nanite_swarm: "Titan Aura: Nanite Infiltration Swarms"
esc_tech_aura_nanite_swarm_desc: "Nanite swarms programmed to eat through enemy armor and chew apart internal structures leave opposing vessels dangerously exposed to the weapons fire that follows."
ESC_TECH_UNLOCK_TITAN_AURA_NANITES: "§HUnlocks Titan Aura§!: Nanite Infiltration Swarms"
ESC_TECH_UNLOCK_TITAN_AURA_NANITES_DESC: "$esc_tech_aura_nanite_swarm_desc$"

esc_tech_aura_space_distortion: "Titan Aura: Space Distortion Module"
esc_tech_aura_space_distortion_desc: "Gravitational field manipulation on a battlefield scale strips our enemies of the freedom to maneuver and fire at will, ceding total control of the engagement to us."
ESC_TECH_UNLOCK_TITAN_AURA_SPATIAL: "§HUnlocks Titan Aura§!: Space Distortion Module"
ESC_TECH_UNLOCK_TITAN_AURA_SPATIAL_DESC: "$esc_tech_aura_space_distortion_desc$"

esc_tech_precursor_armaments: "Precursor Armament Technologies"
esc_tech_precursor_armaments_desc: "The great civilizations of the ancient galaxy built specialized power systems for one purpose: to push their weapons to heights that would make modern engineers weep with envy."

############################################################
###            Biological Weapons Technologies           ###
############################################################

esc_tech_bio_cannon_1: "Bile Spitter"
esc_tech_bio_cannon_1_desc: "Space fauna has survived the void for untold millennia by evolving some of the most efficient predatory tools in the galaxy, and there is no reason we cannot learn from nature's designs and press a few modified specimens into service."
gateway_ESC_BIOLOGICAL_CANNON: "Biological Cannons"

esc_tech_bio_cannon_2: "Vile Bile Spitter"
esc_tech_bio_cannon_2_desc: "The experiment of turning modified space organisms into living cannons has proven itself beyond doubt, and it is time to build upon nature's foundation and develop these creatures into truly formidable weapons of space warfare."

esc_tech_bio_cannon_3: "Acid Spitter"
esc_tech_bio_cannon_3_desc: "Our growing mastery over the machinery of life opens the door to entirely new genome sequences for our living cannons, each more powerful and corrosive than what came before."

esc_tech_bio_cannon_4: "Acid Erucator"
esc_tech_bio_cannon_4_desc: "Several new genome sequences have brought us to the threshold of the ideal biological cannon. This is the pinnacle of what selective breeding and directed mutation can achieve."

esc_tech_bio_missile_1: "Acid Blob Bomb"
esc_tech_bio_missile_1_desc: "The void-hardened predators of space have evolved sophisticated delivery mechanisms for their most potent chemical weapons, and with selective modification a few promising specimens can be transformed into living missile launchers for our fleets."
gateway_ESC_BIOLOGICAL_MISSILES: "Biological Missiles"

esc_tech_bio_missile_2: "Vile Acid Blob Bomb"
esc_tech_bio_missile_2_desc: "New genome sequences pushed through careful selective breeding produce a living missile launcher of greater corrosive potency and range."

esc_tech_bio_missile_3: "Devouring Acid Blob Bomb"
esc_tech_bio_missile_3_desc: "The culmination of our biological missile program, this organism represents the ideal living launcher: acid production glands of maximum capacity and payloads that dissolve through armor plating as though it were not there."

esc_tech_bio_missile_x_1: "Acid Blob Barrage"
esc_tech_bio_missile_x_1_desc: "Our largest warships demand weapons to match their scale, and modifying the Acid Blob Bomb Spitter strain toward gigantism creates a living launcher capable of raining acid barrages that can overwhelm any target."
gateway_ESC_BIOLOGICAL_X_MISSILES: "Superscale Biological Missiles"

esc_tech_bio_missile_x_2: "Devouring Acid Blob Barrage"
esc_tech_bio_missile_x_2_desc: "Carefully targeted genomic modifications push the Acid Blob Barrager to a new plateau of destructive output, ensuring our finest ships carry the most fearsome living artillery available."

esc_tech_bio_missile_titanic: "Acid Blob Storm"
esc_tech_bio_missile_titanic_desc: "The titanic warships of our fleet demand a living missile launcher of matching scale: a creature that unleashes storms of acidic projectiles with each attack, capable of dissolving entire formations before they close to engagement range."

esc_tech_repeatable_bio_damage: "Acid Volatility"
esc_tech_repeatable_bio_damage_desc: "Selective pressure toward more potent and volatile acid production strains yields living weapons whose every shot does more damage than the last generation."

esc_tech_repeatable_bio_fire_rate: "High-Capacity Acid Glands"
esc_tech_repeatable_bio_fire_rate_desc: "Breeding our living weapons toward larger and faster-working acid production glands increases the rate at which they can engage targets without any loss in potency per shot."

############################################################
###             Archaeo Component Technologies           ###
############################################################

esc_tech_archaeo_laser_2: "Tech-Synthetic Beam Cannon"
esc_tech_archaeo_laser_2_desc: "Merging the precursor Cavitation Collapser with our own advances in laser technology produces a beam cannon of far superior power, greater than the sum of its parts."
esc_tech_archaeo_laser_2_bio: "Tech-Synthetic Collapsar Eyebeam"
esc_tech_archaeo_laser_2_bio_desc: "Weaving precursor Cavitation Collapser technology into biological beam emitters produces a new class of organic weapon whose output dwarfs anything achieved by purely native research."

esc_tech_archaeo_laser_3: "Advanced Tech-Synthetic Beam Cannon"
esc_tech_archaeo_laser_3_desc: "Continued refinement of the Tech-Synthetic approach squeezes still greater destructive output from the Cavitation Collapser architecture, further widening the gap between these weapons and conventional beam cannons."
esc_tech_archaeo_laser_3_bio: "Evolved Tech-Synthetic Collapsar Eyebeam"
esc_tech_archaeo_laser_3_bio_desc: "The Collapsar Eyebeam has not yet shown its full power, and carefully guided evolution of the biological host structure is the key to unlocking it."

esc_tech_archaeo_mass_driver_2: "Tech-Synthetic Batteries"
esc_tech_archaeo_mass_driver_2_desc: "Fusing precursor Macro Battery architecture with our own mass driver research delivers railguns of far greater hitting power and precision."
esc_tech_archaeo_mass_driver_2_bio: "Tech-Synthetic Macro Shard Batteries"
esc_tech_archaeo_mass_driver_2_bio_desc: "Tighter integration of precursor technologies into the organic Macro Shard Batteries drives significant gains in projectile power and accuracy with each generation."

esc_tech_archaeo_mass_driver_3: "Advanced Tech-Synthetic Batteries"
esc_tech_archaeo_mass_driver_3_desc: "Another generation of refinement to the Tech-Synthetic kinetic battery produces railguns whose penetration and rate of fire set a new standard for the class."
esc_tech_archaeo_mass_driver_3_bio: "Evolved Tech-Synthetic Macro Shard Batteries"
esc_tech_archaeo_mass_driver_3_bio_desc: "Early results have been exceptional, but significant potential remains unexplored in the Macro Shard Battery lineage, and actively guiding their evolution will push the organic weapon to its true ceiling."

esc_tech_archaeo_mass_accelerator_2: "Tech-Synthetic Artillery"
esc_tech_archaeo_mass_accelerator_2_desc: "Merging the precursor Saturator Artillery with our own super-scale mass accelerator designs delivers a cannon of devastating hitting power worthy of the most demanding capital ship engagements."
esc_tech_archaeo_mass_accelerator_2_bio: "Tech-Synthetic Fragmentator Artillery"
esc_tech_archaeo_mass_accelerator_2_bio_desc: "Stronger volatile mixtures, regulated with precision through integrated precursor technology, push the Fragmentator Artillery's destructive output into a new bracket entirely."

esc_tech_archaeo_mass_accelerator_3: "Advanced Tech-Synthetic Artillery"
esc_tech_archaeo_mass_accelerator_3_desc: "Another pass of refinement on the Tech-Synthetic artillery framework produces the most powerful supersized cannons in our arsenal, capable of cracking even the heaviest capital ship armor."
esc_tech_archaeo_mass_accelerator_3_bio: "Evolved Tech-Synthetic Fragmentator Artillery"
esc_tech_archaeo_mass_accelerator_3_bio_desc: "Carefully guided evolution of the Tech-Synthetic Fragmentator Artillery lines unlocks strains of greater mass and explosive force, making each shot a catastrophic event for whatever it strikes."

esc_tech_archaeo_missiles_2: "Tech-Synthetic Nano-Missiles"
esc_tech_archaeo_missiles_2_desc: "Merging the precursor Nano-Missile Cloud Launcher with our own missile research launches swarms of denser, faster, and more lethal projectiles than either technology could generate alone."
esc_tech_archaeo_missiles_2_bio: "Tech-Synthetic Talon Cloud Launcher"
esc_tech_archaeo_missiles_2_bio_desc: "Tighter integration of precursor technologies into the Talon Cloud Launcher sharply increases the speed, volume, and lethality of the biological missile swarms it releases."

esc_tech_archaeo_missiles_3: "Advanced Tech-Synthetic Nano-Missiles"
esc_tech_archaeo_missiles_3_desc: "Further refinement of the Tech-Synthetic missile framework gives us nano-missiles of extraordinary penetrating force, capable of overwhelming point-defense systems and still carrying enough payload to matter."
esc_tech_archaeo_missiles_3_bio: "Evolved Tech-Synthetic Talon Cloud Launcher"
esc_tech_archaeo_missiles_3_bio_desc: "Guided evolution of the Tech-Synthetic Talon Cloud Launcher lineage yields a biological weapon that combines ancient precursor power with the raw adaptability of living tissue."

esc_tech_archaeo_strikecraft_2: "Tech-Synthetic Drone Crafts"
esc_tech_archaeo_strikecraft_2_desc: "Fusing precursor Driller Drone technology with our own strike craft developments creates assault platforms that are faster, tougher, and more lethal than anything we have fielded before."
esc_tech_archaeo_strikecraft_2_bio: "Tech-Synthetic Driller Beasts"
esc_tech_archaeo_strikecraft_2_bio_desc: "Advanced genetic engineering fuses precursor technology into the physiology of our Driller Beasts at a fundamental level. The resulting attack creatures are far more ferocious and resilient."

esc_tech_archaeo_strikecraft_3: "Advanced Tech-Synthetic Drone Crafts"
esc_tech_archaeo_strikecraft_3_desc: "The next generation of Tech-Synthetic Drone Crafts reaches a level of combat performance that puts them in a class apart from any conventional strike craft our enemies might field."
esc_tech_archaeo_strikecraft_3_bio: "Evolved Tech-Synthetic Driller Beasts"
esc_tech_archaeo_strikecraft_3_bio_desc: "Pushing precursor technology deeper into the Driller Beast genome creates attack creatures that seem almost otherworldly in their combat effectiveness."

esc_tech_archaeo_point_defense_2: "Tech-Synthetic Close Interception Weapon Systems"
esc_tech_archaeo_point_defense_2_desc: "Fusing precursor Web Slinger technology with our own CIWS research creates a point-defense system of vastly improved tracking speed and intercept reliability."
esc_tech_archaeo_point_defense_2_bio: "Tech-Synthetic Web Slinger"
esc_tech_archaeo_point_defense_2_bio_desc: "Augmenting the Web Slinger's organic point-defense systems with precursor technology transforms a capable weapon into a near-impenetrable screen against incoming fire."

esc_tech_archaeo_point_defense_3: "Advanced Tech-Synthetic Close Interception Weapon Systems"
esc_tech_archaeo_point_defense_3_desc: "Further refinement of the Tech-Synthetic CIWS architecture delivers a point-defense system that can shred incoming missiles and strike craft before they close to dangerous range."
esc_tech_archaeo_point_defense_3_bio: "Evolved Tech-Synthetic Web Slinger"
esc_tech_archaeo_point_defense_3_bio_desc: "Guided evolution drives the Web Slinger's biological and precursor components toward ever-tighter integration, creating an organic defensive screen that few weapon systems can penetrate."

esc_tech_archaeo_titanic_2: "Tech-Synthetic Ruinator"
esc_tech_archaeo_titanic_2_desc: "Merging the precursor Ruinator Glare with our own titanic weapons research delivers a flagship-scale weapon of fearsome power, the kind that turns the tide of fleet actions."

esc_tech_archaeo_titanic_3: "Advanced Tech-Synthetic Ruinator"
esc_tech_archaeo_titanic_3_desc: "Every refinement to the Tech-Synthetic Ruinator has made it more powerful, and this generation pushes the titanic beam cannon to a level of destructive output that few things in the galaxy can withstand."

esc_tech_archaeoarmor_2: "Tech-Synthetic Armor"
esc_tech_archaeoarmor_2_desc: "Blending precursor Pulse Armor with our finest advances in materials science and shielding technology yields a composite defense that neither lineage alone could produce."
esc_tech_archaeoarmor_2_bio: "Tech-Synthetic Carapace"
esc_tech_archaeoarmor_2_bio_desc: "Guided evolution weaves precursor technology into warbeast carapaces at a structural level, yielding armor of substantially greater durability and a far more refined capacity to generate protective energy fields."

esc_tech_archaeoarmor_3: "Advanced Tech-Synthetic Armor"
esc_tech_archaeoarmor_3_desc: "This iteration of Tech-Synthetic Armor represents the ultimate marriage of precursor and native ingenuity, yielding protection that shrugs off attacks that would cripple any conventional ship."
esc_tech_archaeoarmor_3_bio: "Evolved Tech-Synthetic Carapace"
esc_tech_archaeoarmor_3_bio_desc: "Driving the integration of precursor technology deeper into the warbeast's own flesh produces a carapace that may represent the absolute ceiling of what biological armor can achieve."

esc_tech_archaeoshield_2: "Tech-Synthetic Shields"
esc_tech_archaeoshield_2_desc: "An improved Suspension Field design that incorporates our most valuable force-field research alongside the precursor framework, resulting in a combined shield substantially stronger than either approach alone."
esc_tech_archaeoshield_2_bio: "Tech-Synthetic Suspension Field Tissue"
esc_tech_archaeoshield_2_bio_desc: "Guided evolution of the warbeast's tissue improves its resonance with the precursor suspension field nodules, strengthening the shield and accelerating its recovery."

esc_tech_archaeoshield_3: "Advanced Tech-Synthetic Shields"
esc_tech_archaeoshield_3_desc: "The most advanced refinement of Tech-Synthetic Suspension Field technology produces shields of extraordinary strength, the kind that makes opposing fleet commanders rethink their entire engagement plan."
esc_tech_archaeoshield_3_bio: "Advanced Tech-Synthetic Suspension Field Tissue"
esc_tech_archaeoshield_3_bio_desc: "Further refinement of the biotechnological bond between warbeast tissue and precursor suspension field nodules produces force fields of a strength that few weapons our enemies carry can meaningfully penetrate."

############################################################
###            Crystalline Weapons Technologies          ###
############################################################

esc_tech_crystal_cannon_1: "Crystal Shard Thrower"
esc_tech_crystal_cannon_1_desc: "The Crystalline Entities are composed of some of the toughest material in the known galaxy, and a weapon that fires shards of that very substance against our enemies is a natural first step in exploiting this remarkable resource."
gateway_ESC_CRYSTALLINE_CANNON: "Crystalline Weapons"

esc_tech_crystal_cannon_2: "Improved Crystal Shard Thrower"
esc_tech_crystal_cannon_2_desc: "Modified growth protocols yield tougher crystal shards and a more powerful launching mechanism, sharply increasing the penetrating force of each volley over the first generation."

esc_tech_crystal_cannon_3: "Crystal Spike Thrower"
esc_tech_crystal_cannon_3_desc: "Purpose-grown crystal spikes of exceptional density, paired with refined launching systems that place each shot precisely where it needs to go, make this generation a substantial leap forward."

esc_tech_crystal_cannon_4: "Improved Crystal Spike Thrower"
esc_tech_crystal_cannon_4_desc: "Incremental refinement of the Crystal Spike Thrower's growth chambers and launch mechanics produces higher firepower and the kind of precision that makes even small crystal shards a credible threat to armored targets."

esc_tech_crystal_cannon_5: "Crystal Spear Cannon"
esc_tech_crystal_cannon_5_desc: "Five generations of refinement have produced a crystalline cannon of extraordinary accuracy and firepower, the finest spear-form expression of the technology our engineers have yet devised."
gateway_ESC_CRYSTALLINE_LANCE: "Supersized Crystalline Weapons"

esc_tech_crystal_lance_1: "Crystal Javelin Thrower"
esc_tech_crystal_lance_1_desc: "Proven experience with spinal-mounted weapons now allows us to marry that architecture to crystalline technology, producing a weapon worthy of the largest and most powerful ships in the fleet."

esc_tech_crystal_lance_2: "Crystal Javelin Cannon"
esc_tech_crystal_lance_2_desc: "An accelerator of immense scale, firing oversized spears of semi-organic crystal at velocities sufficient to pierce armor plating that would shrug off almost anything else."

esc_tech_crystal_lance_3: "Crystal Lance Cannon"
esc_tech_crystal_lance_3_desc: "Upgraded growth chambers and a more powerful acceleration system drive crystal lances to velocities that make the previous generation look like a prototype."

esc_tech_crystal_lance_titanic: "Crystalline Impaler"
esc_tech_crystal_lance_titanic_desc: "Scaled to the dimensions of our titanic warships, this crystal lance fires projectiles of such mass and velocity that even the most heavily armored flagship cannot ignore the threat."

esc_tech_improved_crystal_farm: "Improved Crystal Farms"
esc_tech_improved_crystal_farm_desc: "A deeper understanding of living crystal biology allows us to redesign our growing operations for vastly higher yields per unit of space and resource."

############################################################
###              Energy Weapons Technologies             ###
############################################################

esc_tech_laser_6: "Advanced Combat Laser"
esc_tech_laser_6_desc: "New optical and quantum generator technologies allow us to build combat lasers whose coherence and damage output leave every previous generation looking like an early draft."
esc_tech_laser_6_bio: "Advanced Combat Beam Projector"
esc_tech_laser_6_bio_desc: "Guided evolution pushes the biological beam projector's output, coherence, and thermal management to levels the original specimens could never have reached on their own."
gateway_ESC_LASERS: "Advanced Laser Weapons"

esc_tech_laser_7: "Aurora Laser"
esc_tech_laser_7_desc: "A newly developed generator type produces beams of extraordinary coherence and power, and if the few existing demonstrators can be scaled into ship-mounted weapons, our fleet will carry something the galaxy has never seen."
esc_tech_laser_7_bio: "Aurora Beam Projector"
esc_tech_laser_7_bio_desc: "Recent breakthroughs in beam projector biotechnology make it possible to grow organic weapons of extraordinary beam coherence and raw power, formidable even by the standards of our advanced fleet."

esc_tech_energy_torpedo_3: "Muon Launcher"
esc_tech_energy_torpedo_3_desc: "Loading energy launchers with exotic, highly unstable muons turns a capable weapon into something far more destructive. Our engineers are eager to put the concept into service."
esc_tech_energy_torpedo_3_bio: "Biological Muon Launcher"
esc_tech_energy_torpedo_3_bio_desc: "Guided evolution produces specialized organs capable of safely accumulating and explosively launching large quantities of unstable muons, giving our warbeasts a biological weapon of remarkable versatility and destructive force."
gateway_ESC_ENERTY_LAUNCHERS: "Advanced Energy Launchers"

esc_tech_energy_torpedo_4: "Antimatter Launcher"
esc_tech_energy_torpedo_4_desc: "Antimatter is the universe's most perfect explosive, converting every particle of matter it touches into raw energy, and an energy launcher that delivers a concentrated anti-particle payload is among the most devastating weapons conceivable."
esc_tech_energy_torpedo_4_bio: "Biological Antimatter Launcher"
esc_tech_energy_torpedo_4_bio_desc: "Further evolution of the muon launcher yields specialized organs capable of accumulating, containing, and releasing concentrated clumps of antimatter, each shot unleashing a conversion event of extraordinary violence."

esc_tech_disruptors_4: "Tachyon Disruptor"
esc_tech_disruptors_4_desc: "Tachyon-based disruptors operate at a scale of subatomic interference that no conventional particle can match, rending molecular bonds across an enemy hull with a thoroughness that renders armor almost irrelevant."
esc_tech_disruptors_4_bio: "Tachyon Bio-disruptors"
esc_tech_disruptors_4_bio_desc: "Continuous directed evolution of our biological disruptors produces a strain that projects tachyons rather than conventional particles, dissolving subatomic bonds in enemy hull material with merciless efficiency."
gateway_ESC_DISRUPTORS: "Advanced Disruptors"

esc_tech_disruptors_5: "Disruptor Lance"
esc_tech_disruptors_5_desc: "Disruptor beams have always resisted focus, but new quantum generator technologies finally produce a lance-like disruptor of incredible power and range, bypassing every defense that relies on physical matter to function."
esc_tech_disruptors_5_bio: "Bio-disruptor lance"
esc_tech_disruptors_5_bio_desc: "Further improvement upon the biological disruptor template produces an organic weapon that lances through armor, hull, and shield alike as though none of them were there."

esc_tech_plasma_4: "Advanced Plasma Cannon"
esc_tech_plasma_4_desc: "New magnetic containment techniques pack plasma into far more stable configurations, allowing us to build plasma cannons that fire hotter, faster, and with far greater accuracy."
esc_tech_plasma_4_bio: "Advanced Bio-plasma Cannon"
esc_tech_plasma_4_bio_desc: "Selective breeding of our biological plasma weapons toward hotter plasma production and greater magnetic stability yields a new strain of superior potency."
gateway_ESC_PLASMA_CANNONS: "Advanced Plasma Cannons"

esc_tech_plasma_5: "Dragonbreath Cannon"
esc_tech_plasma_5_desc: "Advanced heat-resistant materials and next-generation plasma pumps allow plasma temperatures far beyond what earlier designs could contain, and the results speak for themselves."
esc_tech_plasma_5_bio: "Dragonbreath Bio-plasma Cannon"
esc_tech_plasma_5_bio_desc: "A peculiar mutation in one experimental batch of bio-plasma cannons has unlocked plasma temperatures that should not have been biologically possible, and incorporating it into our standard genetic templates is the obvious and immediate next step."

esc_tech_chrono_cannon: "Chrono-Vortex Cannon"
esc_tech_chrono_cannon_desc: "No armor or shield can protect against a weapon that warps space-time itself, and a cannon capable of projecting unstable chrono-spatial vortices at will is among the most terrifying ideas our weapons engineers have ever put to paper."
esc_tech_chrono_cannon_bio: "Chrono-Vortex Launcher"
esc_tech_chrono_cannon_bio_desc: "Imbuing our bio-plasma cannons with chrono-spatial technology transforms them into living projectors of unstable time-space anomalies, tearing targets apart with distortions that no defensive system can counter."

esc_tech_cloud_lightning_2: "Amplified Cloud Lightning"
esc_tech_cloud_lightning_2_desc: "New channeling methods allow us to amplify the natural electrical discharges of space clouds into something powerful enough for modern warship combat, where every joule of discharge output is damage on the enemy hull."
gateway_ESC_ADV_CLOUD_LIGHTNING: "Advanced Cloud Lightning Weapons"

esc_tech_cloud_lightning_3: "Thunderstorm Generator"
esc_tech_cloud_lightning_3_desc: "Refinements to the generator design transform Cloud Lightning weapons from powerful weapons to veritable electrical storms, capable of overwhelming targets through sheer discharge volume."

esc_tech_mining_laser_2: "Plasma Cutter"
esc_tech_mining_laser_2_desc: "Adapted from the industrial cutting tools of Mining Drones, this plasma cutter redirects its hull-slicing power from ore to armor, excelling in close-range engagements where its focused beam can work uninterrupted."
esc_tech_mining_laser_2_bio: "Plasma Beam Projector"
esc_tech_mining_laser_2_bio_desc: "Originally derived from mining lasers, these biological beam projectors proved surprisingly lethal against armor plating, and expanded bioengineering knowledge allows us to cultivate that destructive potential further still."
gateway_ESC_ADV_MINING_LASER: "Advanced Mining Drone Lasers"

esc_tech_mining_laser_3: "Advanced Plasma Cutter"
esc_tech_mining_laser_3_desc: "Integration of recently developed plasma focusing and thermal management technologies pushes the Plasma Cutter to a level of cutting power that can slice through the heaviest fleet armor with disturbing ease."
esc_tech_mining_laser_3_bio: "Advanced Plasma Beam Projector"
esc_tech_mining_laser_3_bio_desc: "Further guided evolution refines the plasma beam projector's output intensity and beam stability, making each sustained hit a serious structural threat to any armored target."

esc_tech_juggernaut_beam_1: "Juggernaut Beam Cannon"
esc_tech_juggernaut_beam_1_desc: "The Juggernaut is among the most powerful and expensive warships in existence, and it deserves beam weapons built specifically to match its scale and put its power budget to full use."
gateway_ESC_JUGGERNAUT_BEAM_CANNONS: "Juggernaut Beam Cannons"
esc_tech_juggernaut_beam_1_bio: "$esc_tech_juggernaut_beam_1$"
esc_tech_juggernaut_beam_1_bio_desc: "Selective breeding of biological beam emitters toward extreme size and output gives our Juggernaut-class warbeasts weapons that match the scale of the creatures themselves."

esc_tech_juggernaut_beam_2: "Improved Juggernaut Beam Cannon"
esc_tech_juggernaut_beam_2_desc: "Redesigned focusing arrays and upgraded power feeds produce a Juggernaut Beam Cannon of greater sustained output and the improved accuracy to put every shot exactly where it is needed."
esc_tech_juggernaut_beam_2_bio: "$esc_tech_juggernaut_beam_2$"
esc_tech_juggernaut_beam_2_bio_desc: "Further guided evolution of the Juggernaut beam cannon lineage yields greater output intensity and the firing precision to concentrate that power on the most critical points of an enemy hull."

esc_tech_particle_lance_3: "Improved Tachyon Lance"
esc_tech_particle_lance_3_desc: "Incorporating recent advances in tachyon manipulation and beam optics, this improved lance design delivers greater damage output at longer range than its predecessors."
esc_tech_particle_lance_3_bio: "Improved Tachyon Particle Beam"
esc_tech_particle_lance_3_bio_desc: "Selective breeding of organic tachyon beam emitters toward greater power and beam focus produces weapons that strike with greater precision and far more damage per shot."
gateway_ESC_PARTICLE_LANCES: "Advanced Particle Lances"

esc_tech_particle_lance_4: "Hyperdimensional Lance"
esc_tech_particle_lance_4_desc: "A beam confined to a single set of dimensions can be planned for and shielded against, but a lance that attacks through multiple dimensions simultaneously denies the enemy any coherent defensive response and destroys with terrible efficiency."
esc_tech_particle_lance_4_bio: "Hyperdimensional Particle Beam"
esc_tech_particle_lance_4_bio_desc: "Combining existing tachyon beam emitter templates with hyperdimensional technology produces an organic weapon that reaches across multiple dimensions at once, striking a target from angles that no known shielding system can fully account for."

esc_tech_particle_lance_titanic: "Light of Destruction"
esc_tech_particle_lance_titanic_desc: "The titanic warships of our fleet demand particle lances of matching scale, weapons whose beams can lance across entire battlefields and reduce even heavily armored flagships to glowing wreckage."
esc_tech_particle_lance_titanic_bio: "$esc_tech_particle_lance_titanic$"
esc_tech_particle_lance_titanic_bio_desc: "Guided evolution pushes tachyon beam emitters toward extreme size and power. The result is the ultimate organic beam weapon: a creature-mounted lance of awe-inspiring destructive force."

esc_tech_arc_emitter_3: "Lightning Cannon"
esc_tech_arc_emitter_3_desc: "Next-generation power generators and advanced focusing arrays enable arc emitters of far greater discharge voltage, producing bolts that overwhelm both unshielded and shielded targets with equal thoroughness."
esc_tech_arc_emitter_3_bio: "Lightning Bio-cannon"
esc_tech_arc_emitter_3_bio_desc: "Guided evolution of biological arc emitters produces creatures capable of unleashing powerful bolts of all-penetrating electricity, their natural bioelectric architecture scaled to a level that makes them devastating in fleet combat."
gateway_ESC_ADV_ARC_EMITTERS: "Advanced Arc Emitters"

esc_tech_arc_emitter_4: "Arc Cannon"
esc_tech_arc_emitter_4_desc: "Reconfigured magnetic lensing arrays allow the arc cannon to concentrate its discharge energy with far greater intensity, producing bursts that can strip away hull sections in a single strike."
esc_tech_arc_emitter_4_bio: "Arc Bio-cannon"
esc_tech_arc_emitter_4_bio_desc: "Additional mutations targeting bioelectric storage and discharge intensity produce a biological arc cannon that delivers overwhelming voltages, disabling enemy systems before the enemy can respond."

esc_tech_arc_emitter_titanic: "Divine Thunder"
esc_tech_arc_emitter_titanic_desc: "A titanic arc cannon of flagship scale, channeling the merciless fury of the Celestial Storms into a focused weapon capable of crippling entire enemy formations in a single devastating discharge."
esc_tech_arc_emitter_titanic_bio: "$esc_tech_arc_emitter_titanic$"
esc_tech_arc_emitter_titanic_bio_desc: "Selective breeding of organic arc cannons toward extreme size and bioelectric capacity produces creatures that strike with the merciless fury of the Celestial Storms, felling entire enemy formations with each discharge."

esc_tech_wave_motion_gun_1: "Wave-Motion Gun"
esc_tech_wave_motion_gun_1_desc: "Specialized exhaust port geometry temporarily redirects engine exhaust into a coherent particle lance of tremendous energy, one that can reduce almost anything in its path to dispersed atoms."
esc_tech_wave_motion_gun_1_bio: "Proton Scream"
esc_tech_wave_motion_gun_1_bio_desc: "Reengineering the warbeast's internal organs and installing specialized focusing muscles in the throat gives the creature the ability to breathe a coherent and highly destructive particle beam at its enemies, a living weapon of terrifying intimacy."
gateway_ESC_WAVE_MOTION_GUN: "Wave-Motion Guns"

esc_tech_wave_motion_gun_2: "Dimensional Wave Cannon"
esc_tech_wave_motion_gun_2_desc: "Dimensional focusing techniques allow the cannon's beam to punch through multiple planes of existence simultaneously, increasing both its accuracy and the damage it delivers on each shot."
esc_tech_wave_motion_gun_2_bio: "Atomic Breath"
esc_tech_wave_motion_gun_2_bio_desc: "Further organ modifications replace singular protons with highly ionized atomic nuclei as the beam medium, multiplying the destructive impact of each breath attack several times over."

esc_tech_wave_motion_gun_titanic: "Titanic Dimensional Wave Cannon"
esc_tech_wave_motion_gun_titanic_desc: "Redesigned magnetic lensing arrays, scaled to the full breadth of a titanic vessel, produce a Wave-Motion Gun of the power and scale that the weapon's original designers always envisioned."
esc_tech_wave_motion_gun_titanic_bio: "Supercharged Atomic Breath"
esc_tech_wave_motion_gun_titanic_bio_desc: "Selective breeding of atomic breath creatures toward titanic size produces subspecies whose particle screams can cut through an enemy fleet formation as though it were made of paper."

esc_tech_arcenciel: "Arc-en-Ciel Cannon"
esc_tech_arcenciel_desc: "The mastery of time and space required to build this weapon is staggering: it seals its target within a pocket dimension and forces a localized Big Crunch, erasing every trace of whatever it strikes from the fabric of reality."

esc_tech_arcenciel_titanic: "$esc_tech_arcenciel$"
esc_tech_arcenciel_titanic_desc: "$esc_tech_arcenciel_desc$"

esc_tech_extradimensional_weapon_2: "Matter Annihilator"
esc_tech_extradimensional_weapon_2_desc: "Combining our own technology with the hard-won knowledge extracted from Unbidden ship debris yields a matter annihilator of vastly superior capability, a proof that even their technology can be turned against its creators."
gateway_ESC_EXTRADIMENSIONAL: "Advanced Matter Disintegrators"

esc_tech_extradimensional_weapon_2_x: "Grand Matter Annihilator"
esc_tech_extradimensional_weapon_2_x_desc: "The Matter Annihilator exceeded every expectation, and our battleship commanders have made it clear they want a scaled-up version as their primary weapon rather than a secondary one."

esc_tech_extradimensional_weapon_2_t: "Titanic Matter Annihilator"
esc_tech_extradimensional_weapon_2_t_desc: "Our titanic warships demand a Matter Annihilator of matching scale, a weapon whose disintegration output can erase capital ships from existence in short order."

esc_tech_extradimensional_weapon_3: "Reality Eraser"
esc_tech_extradimensional_weapon_3_desc: "Infusing the Matter Annihilator beam with Null Void energies produces something beyond a mere weapon: a tool for erasing matter and the very space it once occupied, rewriting local reality shot by shot."

esc_tech_extradimensional_weapon_3_x: "Grand Reality Eraser"
esc_tech_extradimensional_weapon_3_x_desc: "A scaled-up Reality Eraser whose higher power throughput erases matter and space faster than any comparable weapon, stripping away armored flanks before the enemy fleet even realizes what is happening."

esc_tech_extradimensional_weapon_3_t: "Titanic Reality Eraser"
esc_tech_extradimensional_weapon_3_t_desc: "A Reality Eraser scaled to the full dimensions of our titanic warships, capable of erasing battleships and their surrounding space at a rate that makes flagship engagements terrifyingly one-sided."

############################################################
###             Gravitic Weapons Technologies            ###
############################################################

esc_tech_gravity_cannon_1: "Gravitational Anomaly Projector"
esc_tech_gravity_cannon_1_desc: "With precise manipulation of the gravitational field at a chosen location, we can subject enemy ships to tidal forces of staggering magnitude, tearing apart even heavily constructed hulls without needing to touch them."
esc_tech_gravity_cannon_1_bio: "$esc_tech_gravity_cannon_1$"
esc_tech_gravity_cannon_1_bio_desc: "Nodules of dark matter clathrate grafted into warbeast tissue give rise to an organic weapon capable of projecting gravitic anomalies strong enough to pull enemy ships apart from the inside."
gateway_ESC_GRAVITY_CANNONS: "Gravitic Cannons"

esc_tech_gravity_cannon_2: "Microsingularity Cannon"
esc_tech_gravity_cannon_2_desc: "True mastery over gravity allows us to spawn miniature black holes precisely where we choose, and the military implications of placing a singularity inside an enemy formation require no elaboration."
esc_tech_gravity_cannon_2_bio: "$esc_tech_gravity_cannon_2$"
esc_tech_gravity_cannon_2_bio_desc: "Guided evolution of the dark matter clathrate nodules raises their gravitational output to the point where the organic weapon can generate microsingularities on demand. The military implications need no elaboration."

esc_tech_gravity_torpedo_1: "Spatial Distortion Warhead"
esc_tech_gravity_torpedo_1_desc: "A device that generates miniature black holes, when married to a reliable delivery system, becomes a weapon that can reach behind shields and armor alike to tear apart all but the most heavily reinforced targets."
esc_tech_gravity_torpedo_1_bio: "$esc_tech_gravity_torpedo_1$"
esc_tech_gravity_torpedo_1_bio_desc: "Dark matter clathrate makes for a biological missile payload of extraordinary violence, detonating with severe spatial distortions that shred targets through gravitational shear rather than conventional explosive force."
gateway_ESC_GRAVITY_TORPEDOES: "Gravitic Torpedoes"

esc_tech_gravity_torpedo_2: "Microsingularity Warhead"
esc_tech_gravity_torpedo_2_desc: "A denser dark matter core and refined warhead geometry greatly increase the spatial distortion yield, producing a torpedo that generates genuine microsingularities on impact and leaves little of its targets intact."
esc_tech_gravity_torpedo_2_bio: "$esc_tech_gravity_torpedo_2$"
esc_tech_gravity_torpedo_2_bio_desc: "Denser dark matter clathrate packing and upgraded organic containment tissues amplify the detonation to the point where the biological warhead creates a genuine microsingularity, briefly but catastrophically, at the point of impact."

esc_tech_gravity_lance_1: "Super-Graviton Cannon"
esc_tech_gravity_lance_1_desc: "A coherent beam of condensed gravitons warps the space-time continuum along its firing path, and whatever lies in that warped corridor is subjected to tidal forces that shred it apart without any explosive or thermal effect whatsoever."
gateway_ESC_GRAVITY_LANCES: "Super-Graviton Cannons"

esc_tech_gravity_lance_2: "Focused Super-Graviton Cannon"
esc_tech_gravity_lance_2_desc: "New graviton lensing techniques increase beam coherency by an order of magnitude, significantly amplifying the space-time distortion along the firing path and the destruction it delivers."

esc_tech_gravity_lance_titanic: "Titanic Super-Graviton Cannon"
esc_tech_gravity_lance_titanic_desc: "Scaled to the dimensions of our titanic warships, this Super-Graviton Cannon produces a space-time corridor of distortion wide enough to catch entire enemy formations in its path."

esc_tech_gravity_bombers: "Singularity Bombers"
esc_tech_gravity_bombers_desc: "Equipping standard strike craft with black hole-generating bomb payloads transforms them into attack craft capable of delivering pinpoint gravitational catastrophe to capital ships that nothing else can easily reach."
esc_tech_gravity_bombers_bio: "Singularity Warbeasts"
esc_tech_gravity_bombers_bio_desc: "Integrating dark matter clathrate nodules into space amoebas gives them the natural ability to project gravitational weapons of alarming potency, transforming a passive creature into a living attack bomber."

############################################################
###              Kinetic Weapons Technologies            ###
############################################################

esc_tech_mass_driver_6: "Advanced Gauss Cannon"
esc_tech_mass_driver_6_desc: "Accumulated experience in space warfare reveals clear paths to improving the Gauss Cannon's rail geometry and firing cycle, yielding a weapon of greater kinetic energy and better accuracy."
esc_tech_mass_driver_6_bio: "Evolved Shard Gauss Accelerator"
esc_tech_mass_driver_6_bio_desc: "Selective breeding of biological shard gauss accelerators toward denser shard production and improved targeting reflexes makes each volley both more powerful and more reliably placed."
gateway_ESC_MASS_DRIVERS: "Advanced Mass Drivers"

esc_tech_mass_driver_7: "Strike Cannon"
esc_tech_mass_driver_7_desc: "New supermagnet technologies enable more compact and far more powerful linear accelerators, producing a mass driver that strikes with exceptional force and the precision that earned it its name."
esc_tech_mass_driver_7_bio: "True-striking Shard Accelerator"
esc_tech_mass_driver_7_bio_desc: "Guided evolution develops shard gauss accelerators that combine the unerring aim of a specialized predator with kinetic outputs that no conventional armor can reliably absorb."

esc_tech_autocannon_4: "Improved Stormfire Autocannon"
esc_tech_autocannon_4_desc: "Practical experience in space warfare reveals specific weaknesses in the Stormfire Autocannon's feed mechanism and barrel geometry, and correcting them yields a weapon of greater power and fire rate."
esc_tech_autocannon_4_bio: "Evolved Stormfire Quill Battery"
esc_tech_autocannon_4_bio_desc: "Selective breeding targets both quill density and the biological firing mechanism's speed, and the new strain delivers a heavier storm of projectiles at a pace that point-defense systems struggle to track."
gateway_ESC_AUTOCANNONS: "Advanced Autocannons"

esc_tech_autocannon_5: "Shredder Autocannon"
esc_tech_autocannon_5_desc: "Advanced materials and next-generation supermagnets allow for a comprehensive redesign of autocannon internals, yielding a weapon whose projectile density and velocity can overwhelm point-defense and chew through light armor simultaneously."
esc_tech_autocannon_5_bio: "Shredder Quill Battery"
esc_tech_autocannon_5_bio_desc: "Bioengineering pushes the quill battery to its evolutionary pinnacle. It fills the surrounding space with projectiles at a rate and density that makes tactical retreat the only sensible response."

esc_tech_kinetic_artillery_3: "Improved Kinetic Artillery"
esc_tech_kinetic_artillery_3_desc: "Combat experience reveals clear improvements to Kinetic Artillery ballistic profiles and targeting algorithms that translate into heavier, more reliable hits at longer range."
esc_tech_kinetic_artillery_3_bio: "Evolved Chitin Artillery"
esc_tech_kinetic_artillery_3_bio_desc: "Guided evolution refines the chitin artillery's launching musculature and targeting instincts, until the biological weapon strikes harder and finds its mark with far greater consistency."
gateway_ESC_KINETIC_ARTILLERY: "Advanced Kinetic Artillery"

esc_tech_kinetic_artillery_4: "Skypiercer Artillery"
esc_tech_kinetic_artillery_4_desc: "Refined projectile geometry and a more powerful acceleration system produce kinetic artillery shots that penetrate deeply enough to pierce through hull sections and out the other side."
esc_tech_kinetic_artillery_4_bio: "Skypiercer Chitin Artillery"
esc_tech_kinetic_artillery_4_bio_desc: "Selective breeding and targeted bioengineering produce chitin artillery of exceptional projectile density and velocity, capable of punching clean through hull plating that stopped every previous generation."

esc_tech_giga_cannon_3: "Improved Giga-Cannon"
esc_tech_giga_cannon_3_desc: "New supermagnet technologies allow more powerful linear accelerators in a more compact form factor, enabling an improved Giga-Cannon that strikes harder and places each shot with far greater precision."
esc_tech_giga_cannon_3_bio: "Evolved Giga-Cannon"
esc_tech_giga_cannon_3_bio_desc: "Guiding organic giga cannon evolution toward greater power and tighter targeting creates weapons that make every earlier iteration look like an approximation of what the design was always meant to become."
gateway_ESC_GIGA_CANNONS: "Advanced Mass Accelerators"

esc_tech_giga_cannon_4: "The Grand Cannon"
esc_tech_giga_cannon_4_desc: "Every accumulated insight from decades of mass accelerator development has been brought to bear on this design, producing cannons of power and precision that set a new standard for what kinetic weapons can accomplish."
esc_tech_giga_cannon_4_bio: "$esc_tech_giga_cannon_4$"
esc_tech_giga_cannon_4_bio_desc: "Targeted genetic engineering of the organic mass accelerator architecture creates a biological cannon of exceptional power and precision, the finest kinetic weapon our warbeasts have ever carried."

esc_tech_giga_cannon_titanic: "Relativistic Kinetic Kill Vehicle"
esc_tech_giga_cannon_titanic_desc: "The Relativistic Kinetic Kill Vehicle carries no warheads and fires no exotic beams, relying instead on the most fundamental law of physics: a dense metal slug moving at near-lightspeed carries enough kinetic energy to outperform almost any alternative, and the enormous accelerators required to achieve that velocity restrict this weapon to the largest vessels in existence."
esc_tech_giga_cannon_titanic_bio: "$esc_tech_giga_cannon_titanic$"
esc_tech_giga_cannon_titanic_bio_desc: "A living organism that fires dense chitin slugs at near-lightspeed, the organic Relativistic Kinetic Kill Vehicle needs no warhead and no exotic beam: the physics does the work, and the organic accelerators capable of achieving those velocities are large enough to restrict this weapon to the greatest warbeasts in the fleet."

esc_tech_autocannon_x_1: "Hailstorm Autocannon"
esc_tech_autocannon_x_1_desc: "Impressed by the performance of fleet autocannons, the admiralty has called for a much larger design that can serve as the primary weapon on battleships, a hailstorm of projectiles at a scale that smaller craft cannot carry."
esc_tech_autocannon_x_1_bio: "Hailstorm Quill Battery"
esc_tech_autocannon_x_1_bio_desc: "Selective breeding of quill batteries toward gigantism and raw output produces a specialized strain that serves as the primary armament for pack-leader warbeasts, delivering concentrated kinetic storms that overwhelm even capital ships."
gateway_ESC_X_AUTOCANNONS: "Supersized Autocannons"

esc_tech_autocannon_x_2: "Firestorm Autocannon"
esc_tech_autocannon_x_2_desc: "Advanced materials and improved supermagnets allow a comprehensive upgrade to the Hailstorm Autocannon, producing a firestorm of kinetic projectiles at a rate that overwhelms point-defense systems and punishes any ship foolish enough to close to range."
esc_tech_autocannon_x_2_bio: "Firestorm Quill Battery"
esc_tech_autocannon_x_2_bio_desc: "Targeted genetic engineering of the hailstorm quill battery's firing mechanism and quill regeneration rate produces a strain that can sustain higher volumes of fire for longer without fatigue."

esc_tech_autocannon_titanic: "Tempest Autocannon"
esc_tech_autocannon_titanic_desc: "The capital ships of our fleet require a Firestorm Autocannon scaled to match their immense size, a tempest of kinetic projectiles that can strip away escorts and suppress entire enemy formations."
esc_tech_autocannon_titanic_bio: "Tempest Quill Battery"
esc_tech_autocannon_titanic_bio_desc: "Additional bioengineering produces a titan-scale quill battery strain of unmatched power and fire rate, transforming the largest warbeasts in the fleet into living autocannon platforms that nothing can comfortably approach."

esc_tech_juggernaut_artillery_1: "Juggernaut Artillery"
esc_tech_juggernaut_artillery_1_desc: "The Juggernaut is an investment of staggering cost and military value, and every shot it fires should carry the weight that investment implies, requiring artillery cannons built specifically for its scale and combat role."
esc_tech_juggernaut_artillery_1_bio: "Juggernaut Chitin Artillery"
esc_tech_juggernaut_artillery_1_bio_desc: "Genetic engineering tailored to the Juggernaut-class warbeast's unique physiology produces a chitin artillery strain of matching scale, each launch delivering destructive force commensurate with the creature that fires it."
gateway_ESC_JUGGERNAUT_ARTILLERY: "Juggernaut Artillery Cannons"

esc_tech_juggernaut_artillery_2: "Improved Juggernaut Artillery"
esc_tech_juggernaut_artillery_2_desc: "Redesigned loading systems and improved ballistic computation yield a Juggernaut Artillery of greater power and the kind of accuracy that allows the Juggernaut to engage priority targets from extreme range."
esc_tech_juggernaut_artillery_2_bio: "Evolved Juggernaut Chitin Artillery"
esc_tech_juggernaut_artillery_2_bio_desc: "Targeted evolution of the juggernaut chitin artillery toward heavier projectile mass and sharper targeting instincts produces a biological weapon ideal for the mightiest creatures in the fleet."

esc_tech_mhd_cannon_1: "Ferromagnetic Liquid Cannon"
esc_tech_mhd_cannon_1_desc: "The Ferromagnetic Liquid Cannon is a giant water-jet cutter repurposed for war: magnetically accelerated molten metal instead of water, a specialized nozzle maintaining laminar flow at extreme pressures, and an initial damage estimate that makes the weapons team very eager to put it in service."
esc_tech_mhd_cannon_1_bio: "Acidic Jet Cutter Cannon"
esc_tech_mhd_cannon_1_bio_desc: "This organic weapon foregoes discrete projectiles entirely, instead producing a relativistic stream of strong acids held coherent by specialized muscle groups that maintain laminar flow across the vast ranges of space combat."
gateway_ESC_MHD_CANNONS: "MagnetoHydroDynamic Cannons"

esc_tech_mhd_cannon_2: "Improved Ferromagnetic Liquid Cannon"
esc_tech_mhd_cannon_2_desc: "More powerful supermagnets accelerate the metal jet to greater velocities, while new heat-resistant materials allow far higher operating temperatures, combining to produce a ferromagnetic cannon that cuts through enemy armor like heated wire through wax."
esc_tech_mhd_cannon_2_bio: "Evolved Acidic Jet Cutter Cannon"
esc_tech_mhd_cannon_2_bio_desc: "Genetic engineering of the nozzle muscle arrangement produces a tighter, more stable acid jet of substantially greater cutting power, the kind of improvement that the weapon's original designers spent years trying to achieve through trial and error."

esc_tech_mhd_cannon_titanic: "MagnetoHydroDynamic Cannon"
esc_tech_mhd_cannon_titanic_desc: "Scaled to the full length of a capital ship hull, this Ferromagnetic Liquid Cannon produces a molten metal jet of staggering energy that can sever a battleship from bow to stern in a sustained burst."
esc_tech_mhd_cannon_titanic_bio: "Superscale Acidic Jet Cutter"
esc_tech_mhd_cannon_titanic_bio_desc: "Selective breeding and targeted bioengineering produce an acid jet cutter scaled for titan-class warbeasts, a biological weapon whose sustained stream can dissolve a capital ship's armor plating with disturbing efficiency."

############################################################
###             Leviathan Weapons Technologies           ###
############################################################

esc_tech_enigmatic_energy_harvesting: "Enigmatic Energy Harvesting"
esc_tech_enigmatic_energy_harvesting_desc: "The Enigmatic Fortress drew on a previously unknown form of energy derived from dark matter, and having defeated it, we now have the opportunity to study, harvest, and ultimately turn that same mysterious power toward our own military needs."
gateway_ESC_ENIGMATIC_WEAPONS: "Enigmatic Energy Weapons"

esc_tech_enigmatic_cannon: "Enigmatic Energy Discharger"
esc_tech_enigmatic_cannon_desc: "Fired as unstable packets, enigmatic energy releases into powerful explosions on contact, and launching large blobs of it at enemy ships produces an artillery weapon of extraordinary destructive scope."

esc_tech_enigmatic_lash: "Enigmatic Energy Lash"
esc_tech_enigmatic_lash_desc: "Enigmatic energy transforms standard discharges into lashing arcs of devastating power that seek out material objects of all sizes, from enemy hulls to incoming missiles, making this weapon as effective in point-defense as it is in direct engagement."

esc_tech_enigmatic_autocannon: "Enigmatic Energy Autocannon"
esc_tech_enigmatic_autocannon_desc: "Smaller, rapidly fired packets of enigmatic energy each detonate on contact with devastating effect, and at high fire rates this weapon overwhelms point-defense and armor with a relentless barrage that gives enemies no time to respond."

esc_tech_enigmatic_lance: "Enigmatic Energy Lance"
esc_tech_enigmatic_lance_desc: "Channeling enigmatic energy into a particle beam produces something more terrifying than the sum of its parts: a lance of almost incomprehensible destructive potential that obliterates whatever it strikes with no regard for armor or shielding."
gateway_ESC_ENIGMAITC_LANCES: "Enigmatic Energy Lances"

esc_tech_enigmatic_lance_titanic: "Supersized Enigmatic Energy Lance"
esc_tech_enigmatic_lance_titanic_desc: "A flagship-scale Enigmatic Energy Lance of sufficient power to serve as the primary armament of our greatest warships, a weapon whose beam arrival marks the end of any engagement it joins."

esc_tech_extradimensional_pd: "Extradimensional Spike"
esc_tech_extradimensional_pd_desc: "The Dimensional Horror's technique of projecting its limbs through portals offered a disturbing insight: a weapon that opens dimensional portals at the target's location and allows extradimensional entities to handle the actual attack, bypassing the distance problem entirely."

esc_tech_space_whale_weapon_2: "Advanced Energy Syphon"
esc_tech_space_whale_weapon_2_desc: "The Tiyanki's Energy Syphon evolved over eons as a feeding and defensive tool, and the practical experience of deploying it in fleet combat has given our researchers clear ideas for making it considerably more effective."

esc_tech_space_whale_weapon_3: "Paradox Energy Syphon"
esc_tech_space_whale_weapon_3_desc: "Some unconventional thinking in our research community has produced ideas for manipulating the Energy Syphon's drain field in ways that were not biologically anticipated, potentially transforming it into a weapon of unimaginable power."

esc_tech_tiyanki_beam: "Tiyanki Beam Cannon"
esc_tech_tiyanki_beam_desc: "The Tiyanki Matriarch wielded her primary beam weapon with an ease that was remarkable for a biological creature, and successfully replicating it will give our larger warships a main gun with the natural lethality of one of the galaxy's great predators."
gateway_ESC_TIYANKI_BEAM: "Tiyanki Beam Cannons"

esc_tech_tiyanki_beam_titanic: "Supersized Tiyanki Beam Cannon"
esc_tech_tiyanki_beam_titanic_desc: "A true replication of the Tiyanki Matriarch's organic beam weapon at flagship scale, channeling the ancient predatory power of the Tiyanki line through a weapon platform worthy of the greatest warships in our fleet."

esc_tech_junk_mines: "Junk Mines Launcher"
esc_tech_junk_mines_desc: "The self-propelled mines deployed by Scrapper Bots are deceptively effective for their apparent crudeness, and reverse-engineering them for fleet use offers a weapon that can be built largely from high-tech scrap at a fraction of conventional armament costs."

esc_tech_voidspawn_missile: "Voidspawn Missile"
esc_tech_voidspawn_missile_desc: "The Voidspawn Hatchling's organic missiles are products of a predatory biology evolved for void warfare, and replicating them for fleet use would give our ships a weapon with the instinctive lethality of one of the universe's most formidable creatures."

esc_tech_voidspawn_missile_x: "Voidspawn Missile Barrage"
esc_tech_voidspawn_missile_x_desc: "The standard Voidspawn Missile falls short of what our largest warships require, and scaling its destructive architecture upward to flagship dimensions will give those vessels a primary weapon of extraordinary biological lethality."

############################################################
###              Missile Weapons Technologies            ###
############################################################

esc_tech_missiles_6: "Joker Missiles"
esc_tech_missiles_6_desc: "New stealth and evasion technologies allow us to develop a powerful missile that is almost comically difficult to intercept, capable of slipping through point-defense screens that would stop everything else in our arsenal."
gateway_ESC_ADVANCED_MISSILES: "Advanced Missiles"

esc_tech_missiles_7: "Wraith Missiles"
esc_tech_missiles_7_desc: "The ideal missile is one the enemy never sees coming, and this generation achieves near-perfect sensor invisibility while delivering a payload that makes detection irrelevant by the time it arrives."

esc_tech_plasma_missiles_1: "Plasma Missiles"
esc_tech_plasma_missiles_1_desc: "The idea of combining plasma's raw destructive power with a missile's homing capability has been discussed for years, and we now have the containment and delivery technology to stop discussing and start building."
gateway_ESC_PLASMA_MISSILES: "Plasma Missiles"

esc_tech_plasma_missiles_2: "Improved Plasma Missiles"
esc_tech_plasma_missiles_2_desc: "New particle manipulation techniques push plasma missile warhead temperatures into ranges that melt through armor with thoroughness no earlier warhead could match."

esc_tech_plasma_missiles_3: "Incinerator Missiles"
esc_tech_plasma_missiles_3_desc: "New supermagnet containment allows plasma missiles to carry plasma at temperatures that consume whatever armor they strike, ensuring that even the heaviest capital ship plating provides no meaningful protection on impact."

esc_tech_torpedoes_4: "Desolator Torpedo"
esc_tech_torpedoes_4_desc: "New warhead and propulsion technologies produce a torpedo of sufficiently devastating power that fleet commanders have started calling it the Desolator, a name that reflects both its yield and its intended purpose."
gateway_ESC_ADVANCED_TORPEDOES: "Advanced Torpedoes"

esc_tech_torpedoes_5: "Eradicator Torpedoes"
esc_tech_torpedoes_5_desc: "Refined warhead architecture and improved guidance systems transform our current torpedoes into the Eradicator: a weapon whose name accurately describes what it does to whatever it is aimed at."

esc_tech_corrosive_warhead_torpedo: "Corrosive Warhead Torpedo"
esc_tech_corrosive_warhead_torpedo_desc: "A space-time manipulation device installed on a torpedo frame produces a weapon whose impact does not merely destroy the target, but tears apart the fabric of local spacetime, leaving a wound in reality where the target used to be."

esc_tech_swarmer_missiles_3: "Typhoon Missiles"
esc_tech_swarmer_missiles_3_desc: "The next generation of swarmer missiles is designed around one premise: more projectiles, each more explosive, arriving faster than any point-defense system can effectively process."
esc_tech_swarmer_missiles_3_bio: "Typhoon Bio-Missiles"
esc_tech_swarmer_missiles_3_bio_desc: "Selective breeding of swarmer bio-missile platforms toward higher brood count and more energetic biological warheads produces a new generation of living launchers that can saturate point-defense screens with sheer volume."
gateway_ESC_ADVANCED_SWARMER_MISSILES: "Advanced Swarmer Missiles"

esc_tech_swarmer_missiles_4: "Hurricane Missiles"
esc_tech_swarmer_missiles_4_desc: "A combination of faster flight profiles, denser warheads, and more erratic evasion algorithms produces swarmer missiles that arrive in larger numbers, hit harder, and give point-defense systems far less time to respond."
esc_tech_swarmer_missiles_4_bio: "Hurricane Bio-Missiles"
esc_tech_swarmer_missiles_4_bio_desc: "Guided evolution of the Typhoon Bio-Missile lineage toward greater speed, warhead potency, and evasion instinct produces a living swarm that point-defense systems can track but cannot stop in time."

esc_tech_xmissile_1: "Exotic Matter Warhead"
esc_tech_xmissile_1_desc: "Our current missiles were designed with fleet engagements in mind, not dedicated capital ship killing, and filling that gap requires something larger, more powerful, and harder to shoot down."
gateway_ESC_X_MISISLES: "Supersized Missile Weapons"

esc_tech_xmissile_2: "Strange Matter Warhead"
esc_tech_xmissile_2_desc: "Strange matter is a form of exotic matter whose contact with conventional matter initiates a conversion reaction of extraordinary violence, and upgrading our missile warheads to carry it produces anti-capital weapons of unsettling destructive potential."

esc_tech_xmissile_titanic: "Reflex Warhead Launcher"
esc_tech_xmissile_titanic_desc: "The prototype Reflex Warhead demonstrated yields sufficient to threaten even the largest warships in the galaxy, and a missile platform designed from the ground up around its capabilities will make that threat a fleet-standard reality."

############################################################
###              Nanite Weapons Technologies             ###
############################################################

esc_tech_nanite_cannon_1: "Nanite Cannon"
esc_tech_nanite_cannon_1_desc: "Nanites are capable of systematically disassembling anything they contact if given sufficient time and numbers, and the simplest way to deliver a lethal dose to an enemy ship is to fire a canister full of them directly at the hull."
esc_tech_nanite_cannon_1_bio: "Nanite Bio-Cannon"
esc_tech_nanite_cannon_1_bio_desc: "Advanced bioengineering creates a symbiotic weapon organism that both hosts and weaponizes large nanite colonies, using them for self-maintenance and as aggressive ammunition that disassembles targets for the warbeast to consume."
gateway_ESC_NANITE_CANNONS: "Nanite Cannons"

esc_tech_nanite_cannon_2: "Improved Nanite Cannon"
esc_tech_nanite_cannon_2_desc: "Advances in nanite research yield improved canister delivery systems and nanite strains of significantly more aggressive disassembly protocols, shortening the time from first contact to catastrophic hull failure."
esc_tech_nanite_cannon_2_bio: "Evolved Nanite Bio-Cannon"
esc_tech_nanite_cannon_2_bio_desc: "Deeper nanite integration into the organic launcher's tissue and the use of more aggressively programmed nanites as projectiles produces a bio-cannon whose every shot is a self-propagating disassembly event."

esc_tech_nanite_reconstructor: "Nanite Reconstruction Beam"
esc_tech_nanite_reconstructor_desc: "Nanites can create temporary molecular bridges between ships to transport matter, and weaponizing that capability produces a beam that dismantles the enemy hull and feeds the harvested material directly into repairing our own."
esc_tech_nanite_reconstructor_bio: "Nanite Tissue Reconstructor"
esc_tech_nanite_reconstructor_bio_desc: "Grafting a nanite-cybernetic weapon onto our warbeasts allows them to bridge themselves to targets, siphoning structural matter through molecular tunnels while the harvested material feeds onboard synthesis of the restorative enzymes needed for rapid tissue regeneration."

esc_tech_nanite_torpedo_1: "Nanite Warhead Torpedo"
esc_tech_nanite_torpedo_1_desc: "Nanites left unchecked on an enemy hull will disassemble the entire ship given enough time, and a torpedo or missile serves as the ideal delivery vehicle to get a lethal concentration through shields and onto the target."
esc_tech_nanite_torpedo_1_bio: "$esc_tech_nanite_torpedo_1$"
esc_tech_nanite_torpedo_1_bio_desc: "Organic missiles make ideal carriers for large nanite payloads, delivering the disassembly swarm directly to the target's surface where it immediately begins the systematic dismantlement of whatever it lands on."
gateway_ESC_NANITE_TORPEDOES: "Nanite Torpedoes"

esc_tech_nanite_torpedo_2: "Gray Goo Torpedo"
esc_tech_nanite_torpedo_2_desc: "New nanite strains programmed with far more aggressive disassembly protocols transform the Nanite Warhead Torpedo into a weapon whose payload begins consuming the target hull at a rate that makes emergency countermeasures almost futile."
esc_tech_nanite_torpedo_2_bio: "$esc_tech_nanite_torpedo_2$"
esc_tech_nanite_torpedo_2_bio_desc: "Improved organic missile design allows larger nanite payloads with more aggressive disassembly protocols, creating a biological weapon that delivers a gray-goo scenario in miniature to everything it strikes."

esc_tech_nanite_missile_x_1: "Nanite Warhead Missile Launcher"
esc_tech_nanite_missile_x_1_desc: "Nanite torpedoes have proven themselves capable, but our larger warships require the ability to deliver multiple warheads simultaneously, and a dedicated large-format launcher that fires whole volleys of nanite missiles fills that role effectively."
esc_tech_nanite_missile_x_1_bio: "Nanite Warhead Bio-Missile Launcher"
esc_tech_nanite_missile_x_1_bio_desc: "Selective breeding of nanite bio-missile launch organs toward gigantism produces specialized strains capable of releasing entire volleys simultaneously, overwhelming both point-defense systems and enemy nanite countermeasures."
gateway_ESC_NANITE_X_WEAPONS: "Superscale Nanite Missile Launchers"

esc_tech_nanite_missile_x_2: "Nanite Warhead Multi-Missile Launcher"
esc_tech_nanite_missile_x_2_desc: "A comprehensive upgrade to the Nanite Warhead Missile Launcher's magazine capacity, launch mechanism, and warhead potency produces a weapon that can deliver catastrophic nanite saturation to multiple targets in a single engagement."
esc_tech_nanite_missile_x_2_bio: "$esc_tech_nanite_missile_x_2$"
esc_tech_nanite_missile_x_2_bio_desc: "Further evolution of the nanite bio-missile launcher lineage improves both warhead potency and regeneration rate, producing a living weapon that can sustain a relentless rain of nanite payloads across an entire engagement."

esc_tech_nanite_missile_titanic: "Nanite Warhead Rocket Artillery"
esc_tech_nanite_missile_titanic_desc: "Our capital-scale warships require nanite delivery systems of matching scale, and this final scaling of the Nanite Warhead Rocket Artillery can saturate an entire enemy fleet in disassembly swarms with a single coordinated launch."
esc_tech_nanite_missile_titanic_bio: "$esc_tech_nanite_missile_titanic$"
esc_tech_nanite_missile_titanic_bio_desc: "Selective breeding for extreme size and payload capacity produces organic nanite rocket artillery of astonishing scope, the kind of weapon that can determine the outcome of a capital engagement single-handedly."

esc_tech_nanite_bomber: "Nanite Bombers"
esc_tech_nanite_bomber_desc: "Strike craft can reach targets that long-range weapons cannot, and a bomber variant carrying concentrated nanite payloads can place a disassembly swarm precisely where it will do the most structural damage to an enemy capital ship."
esc_tech_nanite_bomber_bio: "Nanite-Augmented Bomber Amoeba"
esc_tech_nanite_bomber_bio_desc: "Augmenting spaceborne amoebas with large colonies of weaponized nanites transforms them into attack creatures that disassemble enemy hulls on contact, their natural resilience making them formidable attack platforms."

esc_tech_repeatable_nanite_damage: "Nanite Aggressiveness Protocols"
esc_tech_repeatable_nanite_damage_desc: "Reprogramming nanite disassembly protocols for greater aggressiveness reduces the time between first contact and catastrophic structural failure, making every nanite weapon in the fleet more lethal."

esc_tech_repeatable_nanite_fire_rate: "Nanite Self-Replication Protocols"
esc_tech_repeatable_nanite_fire_rate_desc: "Optimized self-replication protocols allow nanite populations to replenish themselves between engagements, sustaining the high and stable production rate needed to keep every launcher at maximum output."

############################################################
###               Point Defense Technologies             ###
############################################################

esc_tech_flak_cannon_4: "Improved Flak Artillery"
esc_tech_flak_cannon_4_desc: "Advances in enemy missile and strike craft technology have outpaced our current flak systems, and the only answer is flak artillery with faster tracking, higher fire rates, and more lethal rounds."
esc_tech_flak_cannon_4_bio: "Evolved Barb Artillery"
esc_tech_flak_cannon_4_bio_desc: "Evolving extra sensory organs and dedicated neural clusters for threat tracking transforms our barb artillery into biological point-defense systems that can identify, track, and destroy incoming projectiles with a precision no machine can match."
gateway_ESC_FLAK_CANNONS: "Advanced Flak Cannons"

esc_tech_flak_cannon_5: "Ironcloud Defender"
esc_tech_flak_cannon_5_desc: "Years of studying every missile technology our enemies and allies have fielded has given us a clear vision of the perfect defense against all of them, and this new flak cannon design creates a defensive screen that nothing so far has successfully penetrated."
esc_tech_flak_cannon_5_bio: "Ironcloud Barb Artillery"
esc_tech_flak_cannon_5_bio_desc: "Further guided evolution of our barb artillery toward faster reflexes and higher discharge rates creates biological point-defense systems that deny enemy missiles and strike craft any path to our hulls."

esc_tech_point_defense_4: "Protector Point-Defense"
esc_tech_point_defense_4_desc: "Evolving enemy delivery systems have exposed the limitations of our current CIWS point-defense, and the new Protector design addresses those gaps with improved reaction time, higher fire rates, and better tracking accuracy."
esc_tech_point_defense_4_bio: "Protector Snapper Gun"
esc_tech_point_defense_4_bio_desc: "Dedicated neural clusters for rapid sensory processing give the snapper gun the cognitive speed needed to track and intercept the fastest modern projectiles before they reach their intended targets."
gateway_ESC_PD_CANNONS: "Advanced Point-Defense Cannons"

esc_tech_point_defense_5: "Iron Curtain Point-Defense"
esc_tech_point_defense_5_desc: "This radically redesigned point-defense system creates a defensive screen of such density and reliability that enemy missile crews will eventually stop launching at ships equipped with it."
esc_tech_point_defense_5_bio: "Iron Curtain Snapper Gun"
esc_tech_point_defense_5_bio_desc: "Guided evolution of neural clusters and specialized sensory organs pushes our biological interception systems to the point where they can track and destroy virtually any projectile an enemy is likely to fire at us."

esc_tech_juggernaut_pd_1: "Juggernaut Point Defense System"
esc_tech_juggernaut_pd_1_desc: "The Juggernaut's immense surface area and strategic value demand point-defense systems of matching scale, purpose-built to protect the most expensive warship in any fleet from the missiles and strike craft that target it disproportionately."
esc_tech_juggernaut_pd_1_bio: "Juggernaut Snapper Gun"
esc_tech_juggernaut_pd_1_bio_desc: "Several snapper gun strains have displayed a natural tendency toward gigantism, and with that size comes a proportional increase in interception power, making them ideal candidates for selective breeding into dedicated defensive weapons for our Juggernaut-class warbeasts."
gateway_ESC_JUGGERNAUT_PD: "Juggernaut Point-Defense Systems"

esc_tech_juggernaut_pd_2: "Improved Juggernaut Point Defense System"
esc_tech_juggernaut_pd_2_desc: "Upgraded targeting computers and improved barrel rotation speed give the Juggernaut Point Defense System the tracking speed and volume of fire needed to reliably protect even the largest warships against saturation attacks."
esc_tech_juggernaut_pd_2_bio: "Evolved Juggernaut Snapper Gun"
esc_tech_juggernaut_pd_2_bio_desc: "Additional sensory organs and expanded neural processing clusters give our Juggernaut snapper guns the perceptual acuity to track and eliminate threats that their predecessors would have lost in the clutter."

esc_tech_point_defense_laser: "Lightstorm Point-Defense"
esc_tech_point_defense_laser_desc: "Laser point-defense has always been theoretically appealing but practically limited by coherence and power density at useful ranges, and only now do we have the optical and power technologies needed to build a system that actually works across the extreme distances of space combat."
esc_tech_point_defense_laser_bio: "Fierce Glare Beam Projector"
esc_tech_point_defense_laser_bio_desc: "Transplanting snapper gun sensory organs and neural clusters into eyebeam projectors gives the biological laser system the predatory threat-tracking instincts it needs to reliably intercept incoming fire at combat ranges."

############################################################
###              Psionic Weapons Technologies            ###
############################################################

esc_tech_psionic_cannon_1: "Psionic Energy Projector"
esc_tech_psionic_cannon_1_desc: "Psionic energy can be concentrated into a coherent beam and transmitted over vast distances, and past a certain threshold of intensity it becomes a weapon of considerable destructive force, one that bypasses some defenses that conventional energy weapons cannot."
esc_tech_psionic_cannon_1_bio: "$esc_tech_psionic_cannon_1$"
esc_tech_psionic_cannon_1_bio_desc: "Deliberately influencing the growth of specialized cerebral glands can unlock dormant psionic potential in our warbeasts, giving them a means of attack that no purely physical defense can fully stop."
gateway_ESC_PSIONIC_CANNONS: "Psionic Cannons"

esc_tech_psionic_cannon_2: "Psionic Beam Cannon"
esc_tech_psionic_cannon_2_desc: "Deepening mastery of psionic energy manipulation yields techniques that concentrate and direct the beam with far greater intensity, transforming the Psionic Energy Projector into a weapon of far greater destructive capability."
esc_tech_psionic_cannon_2_bio: "$esc_tech_psionic_cannon_2$"
esc_tech_psionic_cannon_2_bio_desc: "Directed evolution of the cerebral gland architecture amplifies psionic output considerably, giving our warbeasts a weapon of much greater reach and force than the first generation possessed."

esc_tech_psionic_strike_1: "Minor Shroud Pacts"
esc_tech_psionic_strike_1_desc: "Early exploration of the §MShroud§! has introduced us to lesser denizens willing to strike bargains, and some of those pacts grant the ability to call their power down upon our enemies, with proper targeting systems making the application viable even in the precise geometry of ship-to-ship combat."
esc_tech_psionic_strike_1_bio: "$esc_tech_psionic_strike_1$"
esc_tech_psionic_strike_1_bio_desc: "With warbeasts acting as living anchors for §MShroud§! pacts, even creatures of rudimentary intelligence can direct lesser Shroud denizens against targets in combat, turning the living ship itself into a conduit for extradimensional violence."
gateway_ESC_PSIONIC_STRIKES: "Shroud Strike Weapons"

esc_tech_psionic_strike_2: "Lesser Shroud Pacts"
esc_tech_psionic_strike_2_desc: "Our accumulated pacts with the §MShroud§! now grant access to vastly more powerful entities than our earliest contacts, and redesigning the guidance systems to direct those greater forces as weapons turns our ships into instruments of truly formidable extradimensional violence."
esc_tech_psionic_strike_2_bio: "$esc_tech_psionic_strike_2$"
esc_tech_psionic_strike_2_bio_desc: "Further mutations expanding the psionic capacity of warbeast cerebral tissue allow them to maintain pacts with significantly more powerful §MShroud§! denizens, directing forces that the first-generation organic anchors could never have contained."

esc_tech_psionic_torpedo_1: "Psi-Blast Torpedoes"
esc_tech_psionic_torpedo_1_desc: "Concentrated psionic energy released suddenly produces an explosive effect with properties unlike any conventional warhead, and torpedoes offer the ideal delivery system to get that payload through enemy defenses and onto the target."
esc_tech_psionic_torpedo_1_bio: "$esc_tech_psionic_torpedo_1$"
esc_tech_psionic_torpedo_1_bio_desc: "Combining organic missile technology with specialized biological tissue for storing psionic energy produces a living weapon that carries the explosive potential of concentrated psionics directly to the target."
gateway_ESC_PSIONIC_TORPEDOES: "Psionic Torpedoes"

esc_tech_psionic_torpedo_2: "Improved Psi-Blast Torpedoes"
esc_tech_psionic_torpedo_2_desc: "New storage materials and improved psionic compression techniques allow far denser energy packing in the warhead, dramatically amplifying the detonation and producing psionic torpedoes of alarming destructive scope."
esc_tech_psionic_torpedo_2_bio: "$esc_tech_psionic_torpedo_2$"
esc_tech_psionic_torpedo_2_bio_desc: "Refined organic missile architecture allows the biological carrier tissue to store and compress psionic energy far more densely, multiplying the detonation force and making each hit a significant event for even well-armored targets."

esc_tech_psionic_lance_1: "Psionic Lance"
esc_tech_psionic_lance_1_desc: "The latest advances in psionic research have broken through the scale barrier that previously limited psionic weapons to supporting roles, producing main guns of genuine flagship-level power."
gateway_ESC_PSIONIC_LANCES: "Psionic Lances"

esc_tech_psionic_lance_2: "Shroud Piercer"
esc_tech_psionic_lance_2_desc: "Refinements born from our deepest psionic research tighten the lance's beam to a fine point of concentrated mental force, vastly increasing both its range and the catastrophic effect it produces on whatever it strikes."

esc_tech_psionic_lance_titanic: "Void Ray"
esc_tech_psionic_lance_titanic_desc: "The Void Ray scales the Psionic Lance to the full dimensions of a capital warship, channeling psionic energy of sufficient intensity to obliterate targets that nothing smaller could meaningfully threaten."

esc_tech_psionic_interceptors: "Psionic Interceptors"
esc_tech_psionic_interceptors_desc: "Psionic weapons showed clear strike craft potential from the earliest ground tests, and the technology to build fast, lethal psionic interceptors capable of operating autonomously in fleet engagements has finally matured enough to make that promise a reality."
esc_tech_psionic_interceptors_bio: "Psionically-augmented Amoeba"
esc_tech_psionic_interceptors_bio_desc: "Selective breeding and targeted genetic engineering unlock significant latent psionic potential in space-born amoebas, producing attack creatures that combine natural void-resilience with a psionic lethality that conventional weapons cannot easily replicate."

esc_tech_repeatable_psionic_damage: "Focused Minds"
esc_tech_repeatable_psionic_damage_desc: "A mind brought to absolute focus achieves levels of psionic output that no distracted practitioner can approach, and training our psionic weapons crews in that discipline directly increases the damage they deliver."

esc_tech_repeatable_psionic_fire_rate: "Well of Power"
esc_tech_repeatable_psionic_fire_rate_desc: "Sustained psionic weapon use drains even the most gifted minds, but with disciplined training and physiological conditioning, our crews learn to draw from deeper reserves and maintain higher output rates over longer engagements."

esc_tech_psionic_disruptor_2: "Focused Psionic Disruptors"
esc_tech_psionic_disruptor_2_desc: "Improved techniques for focusing psionic energies into tight disruptor fields significantly increase the weapons' ability to degrade enemy hull integrity and disrupt critical ship systems."

esc_tech_bio_psionic_disruptor_2: "$esc_tech_psionic_disruptor_2$"
esc_tech_bio_psionic_disruptor_2_desc: "$esc_tech_psionic_disruptor_2_desc$"

esc_tech_psionic_disruptor_3: "Shroud-Empowered Disruptors"
esc_tech_psionic_disruptor_3_desc: "Channeling psionic energies directly from the §MShroud§! rather than through the crew's own reserves pushes disruptor output to levels that no practitioner's personal power could sustain, producing weapons of deeply unsettling effectiveness."

esc_tech_bio_psionic_disruptor_3: "$esc_tech_psionic_disruptor_3$"
esc_tech_bio_psionic_disruptor_3_desc: "$esc_tech_psionic_disruptor_3_desc$"

esc_tech_psionic_lightning_2: "Focused Psionic Lightning"
esc_tech_psionic_lightning_2_desc: "Improved control over psionic discharge focus allows our lightning weapons to strike with greater precision and far more destructive intensity, making them reliable anti-capital tools rather than supplemental ones."

esc_tech_bio_psionic_lightning_2: "$esc_tech_psionic_lightning_2$"
esc_tech_bio_psionic_lightning_2_desc: "$esc_tech_psionic_lightning_2_desc$"

esc_tech_psionic_lightning_3: "Shroud Lightning"
esc_tech_psionic_lightning_3_desc: "Drawing directly on the vast psionic energies of the §MShroud§! produces lightning strikes of such ferocious intensity that the weapons' own crews must be shielded from the discharge, but the damage they deliver to enemy fleets makes that complexity entirely worthwhile."

esc_tech_bio_psionic_lightning_3: "$esc_tech_psionic_lightning_3$"
esc_tech_bio_psionic_lightning_3_desc: "$esc_tech_psionic_lightning_3_desc$"

############################################################
###                Strike Craft Technologies             ###
############################################################

esc_tech_strikecraft_4: "Assault Strike Craft"
esc_tech_strikecraft_4_desc: "The rapid evolution of space warfare demands strike craft that can outperform the last generation in every respect, and several promising new designs are on the table."
gateway_ESC_STRIKECRAFTS: "Advanced Strike Craft"

esc_tech_strikecraft_5: "Siegebreaker Strike Craft"
esc_tech_strikecraft_5_desc: "The proliferation of advanced point-defense and countermeasure systems means that strike craft must become faster, harder to hit, and more lethal per pass if they are to remain viable in fleet engagements."

esc_tech_strikecraft_6: "Voidstalker Strike Craft"
esc_tech_strikecraft_6_desc: "Access to the most advanced precursor technologies allows us to build strike craft whose speed, survivability, and weapons output place them in a class so far beyond conventional designs that comparison seems almost unfair."

esc_tech_amoeba_2: "Highbred Amoeba"
esc_tech_amoeba_2_desc: "Domesticated amoeba flagella already make formidable attack organisms, and deliberate selective pressure toward greater strength, speed, and resilience will make them significantly more dangerous adversaries for anything that faces them."
gateway_ESC_AMOEBA_STRIKECRAFT: "Advanced Amoeba Flagella"

esc_tech_amoeba_3b: "Genetically-Engineered Amoeba"
esc_tech_amoeba_3b_desc: "Mastery of genetic engineering allows us to methodically eliminate the weaknesses that evolution left in our amoeba flagella while amplifying their natural predatory strengths, producing attack organisms that are the best version of what they were born to be."
gateway_ESC_AMOEBA_STRIKECRAFT_BIO: "Bio-Augmented Amoeba Flagella"

esc_tech_amoeba_4b: "Perfect Space Organisms"
esc_tech_amoeba_4b_desc: "One final push of genetic refinement will complete the transformation of our amoeba flagella from capable predators into perfect space combat organisms, optimized in every biological parameter for the military role they serve."

esc_tech_amoeba_3c: "Cybernetically-Augmented Amoeba"
esc_tech_amoeba_3c_desc: "Cybernetic implants grafted into our amoeba flagella augment their natural capabilities with machine precision, enhancing their strength, resilience, and tactical awareness well beyond what biological evolution could achieve alone."
gateway_ESC_AMOEBA_STRIKECRAFT_CYBER: "Cybernetic Amoeba Flagella"

esc_tech_amoeba_4c: "Bionic Amoeba"
esc_tech_amoeba_4c_desc: "A final generation of cybernetic enhancement fully integrates the amoeba's biology with machine-grade combat systems, producing Bionic Amoeba that are among the most lethal strike organisms in the galaxy."

esc_tech_strikecraft_mercenary_1: "Mercenary Liaisons"
esc_tech_strikecraft_mercenary_1_desc: "Independent spacefaring pilots accumulate combat experience and personal ship modifications that no regular training program can replicate, and the right financial incentives will bring the best of them into our fleet's service."
gateway_ESC_MERCENARY_CTRIKECRAFT: "Mercenary Fighter Squadrons"

esc_tech_strikecraft_mercenary_2: "Elite Mercenary Contacts"
esc_tech_strikecraft_mercenary_2_desc: "Our reputation as fair and generous employers has spread through every cantina and waystation in the sector, and the caliber of mercenary now willing to fly under our colors reflects exactly that, for a reasonable fee, of course."

esc_tech_swarm_strike_craft_2: "Ravaging Swarmers"
esc_tech_swarm_strike_craft_2_desc: "The Scourge swarmers we have captured and reprogrammed are already ferocious fighters, but a regimen of specialized conditioning and carefully dosed combat stimulants can push their aggression and combat effectiveness to truly frightening levels."

############################################################
###               Tesla Weapons Technologies             ###
############################################################

esc_tech_tesla_coil_1: "Tesla Coil"
esc_tech_tesla_coil_1_desc: "Laser-guided conductivity channels allow electrical energy to flow from generator to target across the void of space with remarkable precision, and a weapon built on this principle devastates unshielded electronics with a thoroughness that conventional weapons cannot match."
esc_tech_tesla_coil_1_bio: "Bio-electric Discharger"
esc_tech_tesla_coil_1_bio_desc: "Bioengineered muscle groups of extraordinary electrical capacity, paired with conductive tissues that shape and direct the discharge with precision, give our warbeasts a weapon of natural electrical origin that is devastating against unshielded electronics and spaceborne creatures alike."
gateway_ESC_TESLA_CANNONS: "Tesla Cannons"

esc_tech_tesla_coil_2: "Improved Tesla Coil"
esc_tech_tesla_coil_2_desc: "New superconducting materials allow generators and capacitors to handle currents that would have destroyed earlier designs, boosting Tesla Coil output to levels that compromise even well-shielded enemy electronics."
esc_tech_tesla_coil_2_bio: "Evolved Bio-electric Discharger"
esc_tech_tesla_coil_2_bio_desc: "Guided evolution of bio-electric discharger musculature and storage tissue increases both the charge they can accumulate and the violence of each discharge."

esc_tech_tesla_bomb_1: "Tesla Bomb"
esc_tech_tesla_bomb_1_desc: "A superconducting ring carrying a powerful circulating current stores tremendous electromagnetic energy in a stable state, and breaking that ring triggers a catastrophic discharge that can cripple the electronics of everything within a considerable radius."
esc_tech_tesla_bomb_1_bio: "Bio-electric Bomb"
esc_tech_tesla_bomb_1_bio_desc: "Specialized organic missiles lined with conductive tissue accumulate massive electrical charge during flight and release it all at once on impact, producing an electromagnetic explosion that disables and damages everything in the immediate area."
gateway_ESC_TESLA_TORPEDOES: "Tesla Bombs"

esc_tech_tesla_bomb_2: "Improved Tesla Bomb"
esc_tech_tesla_bomb_2_desc: "Higher-capacity superconducting rings allow our Tesla Bombs to carry far more current before detonation, producing electromagnetic discharges of correspondingly greater range and severity."
esc_tech_tesla_bomb_2_bio: "Evolved Bio-electric Bomb"
esc_tech_tesla_bomb_2_bio_desc: "Guided evolution of conductive tissue density and charge storage capacity produces bio-electric bombs of far greater electromagnetic yield, enough to disable entire clusters of enemy ships on a well-timed detonation."

esc_tech_tesla_cannon_1: "Tesla Cannon"
esc_tech_tesla_cannon_1_desc: "Fleet-scale Tesla Coils prove their worth in battle, but our largest warships require a primary weapon of significantly greater scale and discharge capacity to match their role in capital engagements."
esc_tech_tesla_cannon_1_bio: "Bio-electric Cannon"
esc_tech_tesla_cannon_1_bio_desc: "Selective breeding toward extreme size and bioelectric capacity produces a strain of dischargers capable of serving as the primary long-range weapon of our largest warbeasts, unleashing discharge events that can fry entire compartments of a capital ship."
gateway_ESC_TESLA_LANCES: "Supersized Tesla Cannons"

esc_tech_tesla_cannon_2: "Improved Tesla Cannon"
esc_tech_tesla_cannon_2_desc: "Refined capacitor arrays and improved superconducting channels allow Tesla Cannons to deliver discharge events of far greater intensity, making the weapon a credible threat to even the most electrically hardened targets."
esc_tech_tesla_cannon_2_bio: "Evolved Bio-electric Cannon"
esc_tech_tesla_cannon_2_bio_desc: "Further evolution of the bio-electric cannon lineage toward extreme charge storage and discharge speed produces a living weapon whose electrical output can overwhelm even heavily shielded targets."

esc_tech_tesla_cannon_titanic: "Titanic Tesla Cannon"
esc_tech_tesla_cannon_titanic_desc: "The titanic warships of our fleet demand a Tesla Cannon scaled to match their immense power budgets, a weapon whose discharge can cascade through an enemy formation and leave devastation far beyond what any smaller version could achieve."
esc_tech_tesla_cannon_titanic_bio: "Titanic Bio-electric Cannon"
esc_tech_tesla_cannon_titanic_bio_desc: "Further guided evolution of bio-electric cannon architecture produces a titan-class strain of unparalleled size and discharge capacity, the biological weapon of record for our greatest leviathan-class warbeasts."

esc_tech_tesla_interdictor: "Tesla Interdictors"
esc_tech_tesla_interdictor_desc: "Tesla weaponry loses its effectiveness against shielded targets, but an interdiction platform that positions itself inside the enemy shield bubble and delivers the discharge from within turns that limitation into a non-issue."
esc_tech_tesla_interdictor_bio: "Bio-electric Warbeasts"
esc_tech_tesla_interdictor_bio_desc: "A specialized breeding program produces attack creatures that carry bio-electric weapons directly into enemy shield bubbles before discharging, striking from inside the very defenses designed to stop them."

############################################################
###               Other Weapons Technologies             ###
############################################################

esc_tech_mandibles_4: "Neutronium-Infused Mandibles"
esc_tech_mandibles_4_desc: "Infusing neutronium, one of the strongest materials known to our scientists, into the structural matrix of warbeast mandibles transforms already formidable natural weapons into boarding tools that can pierce almost any hull material."

esc_tech_mandibles_5: "Adamantine Mandibles"
esc_tech_mandibles_5_desc: "A precisely engineered distribution of neutronium inclusions throughout the mandible structure creates a composite weapon whose bite force and edge retention allow it to slice through all but the most exotic armor materials with ease."

esc_tech_mandibles_cyber_1: "Cybernetically-Enhanced Mandibles"
esc_tech_mandibles_cyber_1_desc: "Cybernetic augmentation pushes the already considerable biting force of warbeast mandibles beyond biological limits, and integrated energy dischargers ensure they can defeat the anti-boarding countermeasures that enemies have learned to deploy against us."

esc_tech_mandibles_cyber_2: "Bionic Mandibles"
esc_tech_mandibles_cyber_2_desc: "A new generation of cybernetic mandible enhancements integrates machine-grade servo amplification with the creature's natural strike patterns, producing boarding weapons of exceptional speed and crushing force."

esc_tech_shockwave: "Arc Energy Shockwave"
esc_tech_shockwave_desc: "Conventional improvements to lightning weapons pursue range and power, but a different approach proposes routing the discharge in every direction simultaneously, turning the ship itself into the emitter and striking every target within range at once."

esc_tech_shockwave_dark_matter: "Dark Matter Halo Blast"
esc_tech_shockwave_dark_matter_desc: "Applying the omni-directional blast principles learned from energy shockwave weapon development to dark matter produces a weapon of categorically greater power, one that simultaneously devastates every enemy vessel within its considerable radius."

esc_tech_shockwave_psionic: "Psionic Catastrophe"
esc_tech_shockwave_psionic_desc: "An omni-directional psionic discharge creates a sphere of devastation around the emitter ship, a weapon ideally suited to punishing any enemy force aggressive enough to close the distance and attempt to overwhelm our formation."

esc_tech_shockwave_tesla: "Omni-Directional Tesla Shockwave"
esc_tech_shockwave_tesla_desc: "Integrating Tesla cannon technology into the Arc Energy Shockwave framework produces an omni-directional electromagnetic blast of far greater intensity, capable of disabling enemy vessels that merely close to engagement range."

############################################################
###              Armor Component Technologies            ###
############################################################

esc_tech_armor_6: "Improved Neutronium Armor"
esc_tech_armor_6_desc: "Refined neutronium composition and an optimized layering geometry produce armor plates of vastly improved hardness and fracture resistance, capable of shrugging off impacts that would breach conventional hull plating without a second thought."
esc_tech_armor_6_bio: "Evolved Neutronium Carapace"
esc_tech_armor_6_bio_desc: "Advanced bio-engineering transforms the neutronium filaments within warbeast carapaces into a specialized interlocking weave that absorbs and distributes kinetic impacts with remarkable efficiency, greatly increasing resistance to the projectile weapons that most commonly target biological hulls."
gateway_ESC_ARMOR: "Advanced Armor Types"

esc_tech_armor_7: "Adamantium Armor"
esc_tech_armor_7_desc: "The latest refinement of neutronium armor-making produces a material so resistant to damage that some researchers have taken to calling it Adamantium after the mythical metal, and the projections suggest the nickname may not be an exaggeration."
esc_tech_armor_7_bio: "Adamantium Carapace"
esc_tech_armor_7_bio_desc: "Further bio-engineering and guided evolution of the neutronium carapace lineage produces a new strain so exceptionally tough that researchers have started calling it Adamantium, and early tests suggest the comparison with the mythical metal is not entirely metaphorical."

esc_tech_bio_armor_1: "Bio-Material Armor"
esc_tech_bio_armor_1_desc: "Combining traditional armor materials with colonies of genetically engineered organisms creates something more than hull plating: a living skin that resists damage like metal and repairs itself like flesh, offering a combination that neither material alone could provide."
gateway_ESC_BIO_ARMOR: "Bio-Material Armors"

esc_tech_bio_armor_2: "Improved Bio-Material Armor"
esc_tech_bio_armor_2_desc: "A new strain of armor-type organisms engineered for greater structural resilience, combined with improved base armor materials, produces Bio-Material Armor of substantially greater toughness and considerably faster self-repair rates."

esc_tech_armor_nanite_1: "Nanomaterial Armor"
esc_tech_armor_nanite_1_desc: "Infusing armor plating with nanites programmed to repair structural damage creates an active defense system that patches wounds as they occur, turning hull damage from an accumulating liability into a problem the ship solves itself."
esc_tech_armor_nanite_1_bio: "Nanomaterial-infused Carapace"
esc_tech_armor_nanite_1_bio_desc: "Nanite clusters integrated into warbeast carapaces provide both improved structural resistance and a self-repair capability that allows the creature to recover from wounds that would permanently cripple an unaugmented organic hull."
gateway_ESC_NANITE_ARMOR: "Nanite-Augmented Armors"

esc_tech_armor_nanite_2: "Improved Nanomaterial Armor"
esc_tech_armor_nanite_2_desc: "Advanced structural materials paired with a new generation of repair nanites produce armor that is tougher than its predecessor and repairs breaches at a pace that makes sustained damage accumulation significantly harder for the enemy to achieve."
esc_tech_armor_nanite_2_bio: "Improved Nanomaterial-infused Carapace"
esc_tech_armor_nanite_2_bio_desc: "Combining advanced bio-engineering with improved nanoscale technology produces carapaces whose protective strength and self-repair speed represent a measurable step forward over the first generation of nanite-infused biological armor."

esc_tech_armor_dragonscales_nanite: "Nanite-Augmented Dragonscale Armor"
esc_tech_armor_dragonscales_nanite_desc: "Ether dragon scales are among the toughest materials known to any civilization, and combining them with repair nanites produces armor of staggering durability that also heals itself, the closest our engineers have come to a truly perfect defense."
esc_tech_armor_dragonscales_nanite_bio: "Nanomachine-Infused Dragonscales"
esc_tech_armor_dragonscales_nanite_bio_desc: "Ether Drake scales exhibit structural properties that dwarf anything our warbeasts evolved naturally, and integrating them with nanomachines produces biological armor of such extraordinary capability that nothing in our existing arsenal can reasonably compare."

esc_tech_armor_shield_1: "Shielding Armor"
esc_tech_armor_shield_1_desc: "Specialized nanites programmed to generate and sustain localized energy fields turn standard armor plating into something more: a hybrid defense that hardens the physical structure while simultaneously projecting a shield over it."
esc_tech_armor_shield_1_bio: "Shielding Carapace"
esc_tech_armor_shield_1_bio_desc: "Infusing warbeast carapaces with shield-generating nanites produces a biological defense system effective against both kinetic and energy weapons, the creature's living armor and the field it projects working in concert."
gateway_ESC_SHIELD_ARMOR: "Shield-Generating Armors"

esc_tech_armor_shield_2: "Improved Shielding Armor"
esc_tech_armor_shield_2_desc: "A new generation of nanites capable of manipulating substantially higher energy densities upgrades the shielding armor to produce force fields of considerably greater stopping power."
esc_tech_armor_shield_2_bio: "Evolved Shielding Carapace"
esc_tech_armor_shield_2_bio_desc: "Improved integration of shield-generating nanites with warbeast carapace tissue strengthens both the physical armor and the force field it projects, making the creature harder to damage by any means."

esc_tech_armor_shield_3: "Shielding Bulwark"
esc_tech_armor_shield_3_desc: "The most advanced nanite designs yet produce shielding armor of exceptional toughness and shield output, the two defense layers reinforcing each other to an extent that makes the ship difficult to destroy by any conventional weapon combination."
esc_tech_armor_shield_3_bio: "Perfected Shielding Carapace"
esc_tech_armor_shield_3_bio_desc: "The most refined shield-generating nanites, combined with bio-engineered carapace tissue optimized to host and channel their output, produces the ultimate biological defense: armor and shield working as one inseparable system."

esc_tech_armor_wraith: "Hardlight Armor"
esc_tech_armor_wraith_desc: "The Spectral Wraith's body is composed of hardened light in a configuration that baffles conventional materials science, and successfully replicating that substance will give us armor unlike anything else available in the galaxy."

esc_tech_armor_horror: "Dimensional Horror Armor"
esc_tech_armor_horror_desc: "Analysis of portal residue reveals the composition of the Dimensional Horror's hide: a material that exists partly in other dimensions and is therefore extraordinarily resistant to damage that operates exclusively within our own, offering a level of protection our engineers had not previously thought possible."

esc_tech_crystal_armor_3: "Reinforced Crystalline Plating"
esc_tech_crystal_armor_3_desc: "Crystalline materials combine exceptional hardness with a fracture propagation pattern that localizes damage rather than spreading it, and engineering hull plating from optimized crystal compositions produces the toughest non-exotic armor in our current portfolio."

############################################################
###             Shields Component Technologies           ###
############################################################

esc_tech_shields_6: "Improved Hyper Shields"
esc_tech_shields_6_desc: "Next-generation capacitor technology dramatically improves both the peak strength and recharge rate of Hyper Shields, giving our ships a defensive layer that recovers from sustained fire far more gracefully than current designs allow."
esc_tech_shields_6_bio: "Improved Hyper-shielded Musculature"
esc_tech_shields_6_bio_desc: "Guided evolution of energy-channeling biological tissue produces warbeasts capable of generating stronger shields that recover from each hit more quickly, making sustained combat significantly less dangerous for them."
gateway_ESC_SHIELDS: "Advanced Shields"

esc_tech_shields_7: "Ultrahyperbolic Shields"
esc_tech_shields_7_desc: "Anchoring the shield's energy field in alternate dimensions vastly increases its effective strength, since damage must overcome not just the visible field but the higher-dimensional structure underpinning it, producing shielding of extraordinary protective capacity."
esc_tech_shields_7_bio: "Ultrahyperbolic Shielded Musculature"
esc_tech_shields_7_bio_desc: "Integrating ultrahyperbolic dimensional technology into warbeast flesh gives their biological shield tissue a higher-dimensional anchor, dramatically amplifying the defensive field's strength beyond what the creature's metabolism alone could sustain."

esc_tech_shields_8: "Wave-Force Armor"
esc_tech_shields_8_desc: "Wave-Force Armor technology redirects the energy of incoming attacks into alternate dimensions rather than absorbing it, turning enemy fire into a gift for the shield rather than a threat to it, producing a defensive system that practically grows stronger under sustained bombardment."
esc_tech_shields_8_bio: "Wave-Force Armor"
esc_tech_shields_8_bio_desc: "Evolving the ultrahyperbolic dimension biotechnology to fully redirect incoming attack energy into alternate dimensions produces biological shields of unparalleled effectiveness, warbeasts that become more dangerous to attack as the battle progresses."

esc_tech_shields_cyclonic_1: "Cyclonic Deflectors"
esc_tech_shields_cyclonic_1_desc: "Cyclonic Shield Harmonics creates a feedback relationship between overlapping shield layers, each one accelerating the regeneration of its neighbors, producing a defensive system that recovers from damage at rates conventional deflectors cannot approach."
esc_tech_shields_cyclonic_1_bio: "Cyclonic Energy Flow Musculature"
esc_tech_shields_cyclonic_1_bio_desc: "Musculature layers with opposing energy flow directions can reinforce one another's output, giving our warbeasts protective barriers that recharge far faster than any single-layer system could manage."
gateway_ESC_CYCLONIC_SHIELDS: "Cyclonic Shields"

esc_tech_shields_cyclonic_2: "Cyclonic Shields"
esc_tech_shields_cyclonic_2_desc: "Integrating higher-yield shield capacitors into the cyclonic framework produces a substantially stronger shielding field without sacrificing the rapid regeneration that makes this design valuable."
esc_tech_shields_cyclonic_2_bio: "Evolved Cyclonic Energy Flow Musculature"
esc_tech_shields_cyclonic_2_bio_desc: "Guided evolution can strengthen the existing cyclonic musculature strains, increasing both the raw power of the shields they generate and the speed at which those shields recover between impacts."

esc_tech_shields_cyclonic_3: "Improved Cyclonic Shields"
esc_tech_shields_cyclonic_3_desc: "New field manipulation techniques allow the cyclonic shielding principle to be pushed further, producing a third generation of deflectors that surpasses its predecessors in both raw strength and sustained performance."
esc_tech_shields_cyclonic_3_bio: "Perfected Cyclonic Energy Flow Musculature"
esc_tech_shields_cyclonic_3_bio_desc: "Further genetic engineering brings our warbeasts' cyclonic energy flow musculature to its theoretical peak, the ultimate form of this defensive approach in living organisms."

esc_tech_dark_matter_shields_2: "Improved Dark Matter Shields"
esc_tech_dark_matter_shields_2_desc: "Deeper knowledge of dark matter's properties reveals several avenues for improving the foundational shield design, substantially increasing both the strength and regeneration rate of the shielding field."
esc_tech_dark_matter_shields_2_bio: "Evolved Dark Matter-infused Musculature"
esc_tech_dark_matter_shields_2_bio_desc: "Guided evolution intensifies the interaction between our warbeasts' musculature and the dark matter woven through it, raising their protective output well beyond what the original strains could achieve."
gateway_ESC_DARK_MATTER_SHIELDS: "Advanced Dark Matter Shields"

esc_tech_dark_matter_shields_3: "Perfected Dark Matter Shields"
esc_tech_dark_matter_shields_3_desc: "Total mastery of dark matter's fundamental nature enables the creation of shields far beyond anything previously thought achievable, exploiting properties of this exotic substance that were invisible to earlier researchers."
esc_tech_dark_matter_shields_3_bio: "Perfected Dark Matter-infused Musculature"
esc_tech_dark_matter_shields_3_bio_desc: "Precise biotechnological refinements and targeted genetic interventions bring the dark matter-infused musculature of our warbeasts to perfection, completing what earlier generations of selective breeding began."

esc_tech_psionic_shield_2: "Improved Psionic Shields"
esc_tech_psionic_shield_2_desc: "A sufficiently disciplined mind can project a barrier that no physical shield can replicate, and new techniques for focusing psionic output allow our adepts to push that barrier substantially further."
esc_tech_psionic_shield_2_bio: "Evolved Zro-infused Musculature"
esc_tech_psionic_shield_2_bio_desc: "Genetic refinements to our zro-infused musculature strains coax greater flows of psionic energy from the same tissue, strengthening the protective fields of every creature that carries it."
gateway_ESC_PSIONIC_SHIELDS: "Advanced Psionic Shields"

esc_tech_psionic_shield_3: "Absolute Terror Field"
esc_tech_psionic_shield_3_desc: "Deeper study of psionic theory reveals the Absolute Terror Field, the boundary between the self and everything beyond it made tangible. When many minds focus together on this principle, that boundary can be expanded to encompass entire fleets, producing shields of extraordinary power drawn from the collective will of our psionics."

############################################################
###            Auxiliary Component Technologies          ###
############################################################

esc_tech_auxiliary_fire_control_2: "Advanced Fire Control Systems"
esc_tech_auxiliary_fire_control_2_desc: "Refined targeting algorithms reduce the time between acquisition and solution, allowing our weapons to track and engage targets with greater accuracy and less hesitation."
esc_tech_auxiliary_fire_control_2_bio: "Evolved Combat Synapses"
esc_tech_auxiliary_fire_control_2_bio_desc: "Selectively evolving the neural nodes responsible for battlefield analysis sharpens our warbeasts' ability to read the flow of combat, giving them a decisive edge in identifying and exploiting opportunities."

esc_tech_afterburners_3: "Pulsed Plasma Afterburners"
esc_tech_afterburners_3_desc: "Pulsed plasma propulsion delivers powerful bursts of acceleration on demand, allowing ships to sprint across the tactical field at moments critical to survival or pursuit without a punishing fuel penalty."
esc_tech_afterburners_3_bio: "Evolved Maneuvering Tentacles"
esc_tech_afterburners_3_bio_desc: "Advanced bioengineering can develop maneuvering tentacles of exceptional strength and responsiveness, giving our warbeasts the ability to accelerate in any direction with explosive speed."

esc_tech_reactor_booster_4: "Auxiliary Zero-Point Reactors"
esc_tech_reactor_booster_4_desc: "Miniaturizing zero-point reactor technology yields compact auxiliary power units that deliver extraordinary output for their size, freeing larger reactor capacity for other shipboard systems."
esc_tech_reactor_booster_4_bio: "Auxiliary Zero-Point Metabolism Nodule"
esc_tech_reactor_booster_4_bio_desc: "Engineering our creatures' metabolism nodules to draw on zero-point energy grants them an enormous reserve of power, far exceeding what conventional biological processes alone could supply."

esc_tech_reactor_booster_5: "Auxiliary Singularity Reactors"
esc_tech_reactor_booster_5_desc: "Condensing a singularity reactor into an auxiliary form requires considerable ingenuity, but the result is an auxiliary power source that rivals dedicated primary reactors on lesser vessels."
esc_tech_reactor_booster_5_bio: "Auxiliary Singularity Metabolism Nodule"
esc_tech_reactor_booster_5_bio_desc: "Selective breeding refines the zero-point metabolism nodule beyond what genetic engineering alone could achieve, producing a biological power organ of staggering efficiency."

esc_tech_advanced_shield_capacitors: "Improved Shield Capacitors"
esc_tech_advanced_shield_capacitors_desc: "High-yield capacitor banks of the new generation store charge that older designs could not hold, giving the entire fleet stronger shield fields."

esc_tech_crystal_infused_capacitor: "Crystal-Infused Shield Capacitors"
esc_tech_crystal_infused_capacitor_desc: "Crystalline matter woven into the capacitor banks causes resonant energy to bleed outward into the hull itself, reinforcing the ship's structural integrity alongside its shield strength."

esc_tech_crystal_forged_capacitor: "Crystal-Forged Shield Capacitors"
esc_tech_crystal_forged_capacitor_desc: "Forging the capacitor banks from metal alloyed with crystalline matter produces a fundamentally different interaction between the shield field and the hull, dramatically strengthening both."

esc_tech_aux_maneuver_thrusters: "Auxiliary Maneuver Thrusters"
esc_tech_aux_maneuver_thrusters_desc: "Advanced reaction control systems grant ships the agility to shift course almost instantly, making them far harder to track and far more likely to survive incoming fire."

esc_tech_stellarite_powercore: "Stellarite Power Core"
esc_tech_stellarite_powercore_desc: "The organs of the Stellarite Devourer generate heat and energy at rates normally associated with stars rather than living tissue. Adapting them as auxiliary power cores could give our ships a source of electricity that most of the galaxy has never imagined."

esc_tech_standardized_warheads: "Warhead Standardization"
esc_tech_standardized_warheads_desc: "Rationalizing the warhead families in our arsenal improves the safety of shipboard magazines while also streamlining production in ways that allow for higher-performance munitions across the board."
esc_tech_standardized_warheads_bio: "Compartmentalized Volatiles Sacks"
esc_tech_standardized_warheads_bio_desc: "Compartmentalizing the volatile substances our creatures use to generate organic missiles into separate, damage-resistant sacks greatly reduces the risk of a single hit triggering catastrophic internal detonation, while the more orderly internal layout also accelerates the rate at which new projectiles can be produced."

esc_tech_structural_reinforcement: "Structural Reinforcements"
esc_tech_structural_reinforcement_desc: "Specialized construction techniques distribute stress more evenly through the hull, allowing our ships to absorb punishment that would tear conventional designs apart."

esc_tech_repair_drones: "Repair Drones"
esc_tech_repair_drones_desc: "Repair drones carry the burden of battle damage assessment and restoration away from the crew, allowing our vessels to sustain damage that would otherwise force a retreat while continuing to fight."
esc_tech_repair_drones_bio: "Healing Enzyme Symbionts"
esc_tech_repair_drones_bio_desc: "Symbiotic organisms tailored to live on our warbeasts' outer surface produce specialized enzymes on demand, dramatically accelerating wound closure and tissue regeneration during combat without requiring the creature to divert its own resources to healing."

esc_tech_psionic_reinforcement: "Psionic Reinforcement"
esc_tech_psionic_reinforcement_desc: "A trained psionic crew can extend their collective will outward, wrapping the hull in a field that bolsters both shield integrity and structural resistance against physical impacts."

esc_tech_temporal_displacer: "Temporal Displacement Methods"
esc_tech_temporal_displacer_desc: "Controlled warping of local space-time shifts a ship partially into adjacent dimensional strata, causing a significant portion of incoming fire to pass through where the vessel was rather than where it is, and making disengagement almost trivially easy when the battle turns against us."
esc_tech_temporal_displacer_bio: "$esc_tech_temporal_displacer$"
esc_tech_temporal_displacer_bio_desc: "Controlled warping of local space-time shifts our warbeasts partially into adjacent dimensional strata, causing incoming attacks to pass through empty space where the creature no longer quite exists, and making tactical withdrawal a simple matter of choosing the right moment."

esc_tech_armor_hardening_3: "Nanite Reactive Armor"
esc_tech_armor_hardening_3_desc: "Nanites that can reorganize their structure in fractions of a second open the door to reactive armor that reads the character of each incoming strike and reconfigures itself to meet it optimally, countering energy, kinetic, and exotic attacks with equal effectiveness."

esc_tech_shield_hardening_3: "Citadel Shield Hardening Generators"
esc_tech_shield_hardening_3_desc: "Advances in shield capacitor technology unlock a new class of hardening generator with substantially greater resistance to penetrating fire than any previous design could offer."

esc_tech_armor_hardening_lm_2: "Living Absorption Plating"
esc_tech_armor_hardening_lm_2_desc: "Deeper familiarity with living metal's self-organizing behavior reveals new configurations for reactive armor plating that reduce our ships' vulnerability to penetrating fire beyond what first-generation designs could achieve."

esc_tech_shield_hardening_psi_2: "Shroud-Enhanced Shield Hardener"
esc_tech_shield_hardening_psi_2_desc: "Drawing more deeply on the Shroud's boundless psionic energies allows us to press our shield hardeners beyond the limits of any conventional technique, increasing their resistance to penetrating fire while strengthening the field as a whole."

esc_tech_dead_hand_switch_kill_1: "Dead Hand Switch: Kill Command Protocols"
esc_tech_dead_hand_switch_kill_1_desc: "Self-destruct protocols ensure that a ship facing certain loss does not perish quietly, converting its final moments into one last strike against surrounding enemies at the cost of any crew still aboard."
esc_tech_dead_hand_switch_kill_1_bio: "Catalytic Bladder Augmentation"
esc_tech_dead_hand_switch_kill_1_bio_desc: "Specialized glands filled with highly volatile compounds, engineered to rupture the instant a creature's vital signs cease, give our warbeasts one final act of defiance: a death that damages whatever killed them."

esc_tech_dead_hand_switch_kill_2: "Dead Hand Switch: Annihilate Command Protocols"
esc_tech_dead_hand_switch_kill_2_desc: "The tactical value of coordinated self-destruct events has proven itself beyond argument. Improved protocols now focus on maximizing the destruction delivered in those final moments, making each lost ship as costly as possible for the enemy."
esc_tech_dead_hand_switch_kill_2_bio: "Volatile Catalytic Bladder"
esc_tech_dead_hand_switch_kill_2_bio_desc: "Further genetic refinement increases both the volume and volatility of the compounds stored in our creatures' catalytic bladders, ensuring that when one of our warbeasts falls, the explosion that follows is catastrophic enough to threaten every ship in its vicinity."

esc_tech_dead_hand_switch_heal_1: "Dead Hand Switch: Repair Allies Command Protocols"
esc_tech_dead_hand_switch_heal_1_desc: "Emergency transfer protocols allow a vessel's repair drones to scatter to allied ships the moment destruction becomes inevitable, turning what would have been a total loss into a last contribution to the fleet's survival."
esc_tech_dead_hand_switch_heal_1_bio: "Restorative Enzyme Sacks"
esc_tech_dead_hand_switch_heal_1_bio_desc: "Enzyme sacks distributed across our warbeasts' bodies rupture upon death and release restorative compounds into the surrounding space, providing a final gift to any nearby allies by accelerating their healing at the moment they need it most."

esc_tech_dead_hand_switch_heal_2: "Dead Hand Switch: Support Allies Command Protocols"
esc_tech_dead_hand_switch_heal_2_desc: "The emergency repair drone transfer system has demonstrated its worth in combat repeatedly. A new generation of coordination protocols improves both the speed and efficiency of that transfer, delivering more capable drones where they are needed most."
esc_tech_dead_hand_switch_heal_2_bio: "Supreme Restorative Enzyme Sacks"
esc_tech_dead_hand_switch_heal_2_bio_desc: "Increased potency in the restorative enzyme formula means that the compounds our warbeasts release upon death heal nearby allies more thoroughly, making each fallen creature a more meaningful sacrifice for those that survive."

############################################################
###                  Other Technologies                  ###
############################################################

esc_tech_orbital_powerplant: "Orbital Power Station"
esc_tech_orbital_powerplant_desc: "Standard zero-point reactor designs, reworked to sustain the power demands of massive orbital installations, provide reliable energy at the scale our most ambitious infrastructure requires."

esc_tech_stellar_energy_tower: "Stellar Energy Tower"
esc_tech_stellar_energy_tower_desc: "Recreating the nuclear fusion processes that drove the Stellarite Devourer in a controlled architectural form yields buildings that function as miniature stars, flooding surrounding farmlands with light that dramatically boosts crop yields and providing our researchers with environments no natural planet can offer."

esc_tech_quantum_node: "Quantum Computation Node"
esc_tech_quantum_node_desc: "Computer designs recovered from the Infinity Machine are sufficiently advanced to support semi-automated research facilities, accelerating the pace of scientific discovery well beyond what our own engineers could have managed independently."

esc_tech_reprocessing_plant: "Reprocessing Plant"
esc_tech_reprocessing_plant_desc: "Reprocessing facilities modeled after technology recovered from the Scrapper Bot extract valuable resources from waste streams that conventional processing would simply discard."

esc_tech_zro_distilleries: "Zro Distilleries"
esc_tech_zro_distilleries_desc: "Naturally occurring £sr_zro£ §Y$sr_zro$§! is far too scarce to meet our demands, but the synthesis process, though expensive, produces a supply that nature alone could never provide."

esc_tech_dark_matter_facilities: "Dark Matter Drawing Facilities"
esc_tech_dark_matter_facilities_desc: "The black hole mining stations that once seemed like an inexhaustible source of £sr_dark_matter£ §Y$sr_dark_matter$§! can no longer keep pace with our consumption. Alternative extraction methods must be found."

esc_tech_magmaminer_1: "Planetary Core Mining"
esc_tech_magmaminer_1_desc: "As surface deposits are exhausted by the demands of our growing civilization, the superheated cores and mineral-rich mantles of our planets offer the next frontier in resource extraction."

esc_tech_magmaminer_2: "Improved Planetary Core Mining"
esc_tech_magmaminer_2_desc: "Refined extraction procedures reach deeper and recover material more completely, drawing greater wealth from the planetary cores that earlier methods could only partially exploit."

esc_tech_dragon_hatchery: "Colossal Creature Cloning"
esc_tech_dragon_hatchery_desc: "True mastery over the mechanisms of life allows us to reproduce colossal organisms of alien biology, creatures whose existence defies conventional understanding of what living matter can become."

esc_tech_autocannons_m: "Large Scale Automatic Cannons"
esc_tech_autocannons_m_desc: "Scaling autocannon technology up to medium-slot proportions produces weapons capable of sustaining the rate of fire that made the original designs valuable while delivering enough mass to threaten heavily armored targets."
ESC_TECH_UNLOCK_M_AUTOCANNONS_TITLE: "§HUnlocks components§!: M-slot autocannons"
ESC_TECH_UNLOCK_M_AUTOCANNONS_DESC: "When you need more dakka, it's time to break out bigger guns!"
gateway_ESC_BIG_AUTOCANNONS: "Large Autocannons"

esc_tech_autocannons_l: "Superscale Automatic Cannons"
esc_tech_autocannons_l_desc: "The success of $esc_tech_autocannons_m$ makes the path forward obvious: larger frames, heavier rounds, and even greater rates of sustained fire, pushing automatic cannon technology to its logical extreme."
ESC_TECH_UNLOCK_L_AUTOCANNONS_TITLE: "§HUnlocks components§!: L-slot autocannons"
ESC_TECH_UNLOCK_L_AUTOCANNONS_DESC: "There can never be enough dakka!"

esc_tech_bio_horror_army: "Bio-Horror Armies"
esc_tech_bio_horror_army_desc: "Our mastery of genetics allows us to design creatures specifically optimized for ground warfare, combining predatory instinct with engineered lethality in forms that will haunt the nightmares of anyone who survives facing them."

esc_tech_psi_avatar_army: "Psionic Avatar Summoning"
esc_tech_psi_avatar_army_desc: "The Shroud teems with entities of extraordinary power, and our connection to that dimension is strong enough to negotiate their presence in our own reality as avatars of war, allies bound by psionic pact to fight beside us."

