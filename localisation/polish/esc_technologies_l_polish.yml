## hyperthermia crisis technologies

esc_tech_energy_lens_beam_2: "Improved Flare Emitters"
esc_tech_energy_lens_beam_2_desc: "Combat experience with the Lens Flare Paralyzer and Solar Flare Emitter demonstrated advantages too significant to ignore, pointing toward a second generation of emitter designs with substantially greater output."

esc_tech_energy_lens_beam_3: "Advanced Flare Cannons"
esc_tech_energy_lens_beam_3_desc: "Theoretical models suggest that flare emitter output can be pushed far beyond its current ceiling, yielding weapons whose discharge rivals the final cataclysm of a dying star."

esc_tech_lm_accelerator_2: "Advanced Reshaping Projectile Accelerator"
esc_tech_lm_accelerator_2_desc: "Advanced predictive algorithms refine the reshaping logic that governs $sr_living_metal$ projectiles, increasing their lethality while also reducing the mechanical wear that limited the weapon's operational life."

esc_tech_lm_bio_accelerator_2: "$esc_tech_lm_accelerator_2$"
esc_tech_lm_bio_accelerator_2_desc: "$esc_tech_lm_accelerator_2_desc$"

esc_tech_lm_accelerator_3: "Flowing-shape Projectile Accelerator"
esc_tech_lm_accelerator_3_desc: "The next generation of predictive algorithms is fast enough to allow $sr_living_metal$ projectiles to continue reshaping themselves in flight, adapting to their target in real time between launch and impact and arriving in whatever configuration causes the most damage."

esc_tech_lm_bio_accelerator_3: "$esc_tech_lm_accelerator_3$"
esc_tech_lm_bio_accelerator_3_desc: "$esc_tech_lm_accelerator_3_desc$"

esc_tech_lm_armor_6: "Regenerative Advanced Neutronium Armor"
esc_tech_lm_armor_6_desc: "A breakthrough in $sr_living_metal$ science reveals new structural configurations that push Infernal armor's durability and self-repair capacity beyond every threshold previously thought to be the ceiling."

esc_tech_lm_armor_7: "Regenerative Adamantium Armor"
esc_tech_lm_armor_7_desc: "Continued refinement of living metal forging techniques yields a material that our projections suggest is nearly indestructible, regenerating damage almost as fast as it is inflicted and prompting the scientists who first analyzed its properties to reach for mythological comparisons that would have seemed absurd only decades ago."

esc_tech_lm_armor_bio_6: "Infernal Evolved Neutronium Carapace"
esc_tech_lm_armor_bio_6_desc: "A breakthrough in $sr_living_metal$ science unlocks new approaches to integrating living metal with organic tissue, pushing the durability and regeneration of Infernal carapaces past every limit the previous generation of researchers had accepted."

esc_tech_lm_armor_bio_7: "Infernal Adamantium Carapace"
esc_tech_lm_armor_bio_7_desc: "Guided evolution and intensive bio-engineering combine to produce a carapace strain that our projections describe as nearly indestructible, with regenerative capacity fast enough to match incoming damage, a result so extreme that our researchers have taken to calling it Adamantium in the absence of any more scientific term."
