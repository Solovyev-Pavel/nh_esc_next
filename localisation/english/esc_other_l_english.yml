# Arkship offensive components : ESC components : spinal

sm_esc_arkship_spinal_bio_missile_mount: "Acid Blob Storm Arkship Launchers"
sm_esc_arkship_spinal_bio_missile_mount_desc: "Our Arkship is our home between the stars and the fortress that protects our people from the horrors of the galaxy. It is only natural that we would arm it with the best weapons devised by our scientists. And the massive symbiotic creatures capable of launching veritable storm of deadly acid blobs on our command are definitely the weapon grand enough to be the main armament of our Arkships.\n"
sm_esc_arkship_spinal_crystalline_mount: "Arkship Crystalline Impaler"
sm_esc_arkship_spinal_crystalline_mount_desc: "Our Arkship is our home between the stars and the fortress that protects our people from the horrors of the galaxy. It is only natural that we would arm it with the best weapons devised by our scientists. And the massive crystalline impaler is definitely the weapon grand enough to be the main armament of our Arkships.\n"
