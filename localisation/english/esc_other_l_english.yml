d_esc_mantle_mineral_cluster_desc: "A dense vein of high-grade minerals located deep within the planet's mantle, ripe for extraction by the Mantle Mining Facility."

d_esc_mantle_alloy_plume: "Alloys Plume"
d_esc_mantle_alloy_plume_desc: "A plume of molten alloys surging up from the planet's core into the upper mantle, ready to be siphoned by the Mantle Mining Facility."

d_esc_mantle_exotic_gases_pocket: "Exotic Gases Pocket"
d_esc_mantle_exotic_gases_pocket_desc: "A pressurized pocket of exotic gases trapped within the planet's upper mantle, accessible through the Mantle Mining Facility."

d_esc_mantle_rare_crystal_cluster: "Rare Crystals Cluster"
d_esc_mantle_rare_crystal_cluster_desc: "A sprawling cluster of rare crystals nestled within the planet's mantle, waiting to be claimed by the Mantle Mining Facility."

d_esc_mantle_volatile_motes_cluster: "Molten Motes"
d_esc_mantle_volatile_motes_cluster_desc: "Volatile motes suspended in a pocket of molten rock within the planet's upper mantle, extractable by the Mantle Mining Facility."

d_esc_mantle_trade_value: "Pretty Crystals"
d_esc_mantle_trade_value_desc: "Crystals of no industrial worth, yet prized by the wealthy for their radiance. The Mantle Mining Facility can extract them to meet the ever-growing demand for luxury goods."

d_esc_mantle_living_metal: "Plume of Living Metal"
d_esc_mantle_living_metal_desc: "A strange plume of molten metal that exhibits the behaviors of simple living organisms, hinting at applications for entirely new classes of self-mending materials."

