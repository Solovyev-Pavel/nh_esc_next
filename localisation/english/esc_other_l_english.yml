sm_esc_arkship_crystal_core_armor_desc: "The importance of Arkships for our civilization can't be overstated. And we must do everything in our power to ensure the continued survival of our Arkships. By installing this new crystal-core armor plating, we will significantly increase the defensive capabilities of our Arkships, ensuring it can survive even the most hostile encounters in the interstellar void.\n"
