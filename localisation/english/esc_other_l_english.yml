# Arkship defensive components : vanilla upgrades

sm_esc_arkship_advanced_armor: "Improved Neutronium Armor Plating"
sm_esc_arkship_advanced_armor_desc: "The importance of Arkships for our civilization can't be overstated. And we must do everything in our power to ensure the continued survival of our Arkships. With this new generation of armor plating, we can rest assured that only the fiercest assault has any chance to even damage them.\n"
sm_esc_arkship_advanced_lm_armor: "Improved Regenerative Neutronium Armor Plating"
sm_esc_arkship_advanced_lm_armor_desc: "The importance of Arkships for our civilization can't be overstated. And we must do everything in our power to ensure the continued survival of our Arkships. With this new generation of regenerative armor plating, we can rest assured that only the fiercest assault has any chance to even damage them.\n"
sm_esc_arkship_advanced_crystal_armor: "Reinforced Crystalline Armor Plating"
sm_esc_arkship_advanced_crystal_armor_desc: "The importance of Arkships for our civilization can't be overstated. And we must do everything in our power to ensure the continued survival of our Arkships. With this new generation of crystalline armor plating, we can rest assured that only the fiercest assault has any chance to even damage them.\n"

sm_esc_arkship_advanced_shields: "Improved Hyper-Shield Arrays"
sm_esc_arkship_advanced_shields_desc: "The importance of Arkships for our civilization can't be overstated. And we must do everything in our power to ensure their continued survival. With this new generation of hyper-shield generators, our Arkships will be well-protected from any threats we may encounter on our journey through the dark void of space.\n"
sm_esc_arkship_advanced_psi_shields: "Improved Psionic Shield Generators"
sm_esc_arkship_advanced_psi_shields_desc: "The importance of Arkships for our civilization can't be overstated. And we must do everything in our power to ensure their continued survival. With this new generation of psionic shield generators, our Arkships will be well-protected from any threats we may encounter on our journey through the dark void of space.\n"

# Arkship defensive components : ESC components

