### Machines learn about psionics
esc_special_projects.1001.name: "Organics Display Strange Abilities"
esc_special_projects.1001.desc: "Several organics within our sphere of influence have begun displaying anomalous abilities, collectively designated §MPsionics§!: a form of thought-driven energy manipulation that defies our current physical models. Our $job_calculator$ drones believe these abilities can be weaponized for fleet use. Shall we authorize this research?"
esc_special_projects.1001.a: "We must learn all that we can about this!"
esc_special_projects.1001.b: "We have better things to research"

ESC_MACHINE_EMPIRE_PSIONICS: "What is §MPsionics§!?"
ESC_MACHINE_EMPIRE_PSIONICS_DESC: "Organics within our sphere display anomalous abilities they call §MPsionics§!: thought-driven energy manipulation that appears to violate known physical laws. The Guiding Intelligence has concluded that these abilities can be refined into fleet-grade weapons, granting us a considerable advantage over our foes."

esc_special_projects.1002.name: "§MPsionics§! Research Complete!"
esc_special_projects.1002.desc: "Our $job_calculator$ drones have found a way to control and amplify the §MPsionic§! abilities of organics, enabling us to forge ship weapons capable of piercing through seemingly any number of armor layers. These §MPsionic§! weapons require organic crew to operate, and the substance known as £sr_zro£ §Y$sr_zro$§! to reach their full potency."

### Automated Dreadnought computers
esc_special_projects.2002.name: "Automated Dreadnought Observation: Suggestion"
esc_special_projects.2002.desc: "The Automated Dreadnought refuses to yield its secrets through direct study, but its eternal patrol of this system offers another path. By carefully observing its movements and combat patterns, we may be able to replicate the logic behind its remarkably advanced combat computers for our own fleets."
esc_special_projects.2002.option.a: "We will learn what we can"
esc_special_projects.2002.option.b: "We don't need to copy from this piece of junk!"

ESC_DREADNOUGHT_OBSERVATION: "Automated Dreadnought Observation"
ESC_DREADNOUGHT_OBSERVATION_DESC: "The Automated Dreadnought's combat systems exhibit no true intelligence, yet operate with a sophistication that puts our own to shame. Replicating even a fraction of their logic would greatly bolster our fleets."

esc_special_projects.2003.name: "Automated Dreadnought Observation: Report"
esc_special_projects.2003.desc: "Our observation team has gathered enough data on the Automated Dreadnought's combat behavior for our science department to begin replicating the logic behind its computers, adapted for our own ship designs."

### Nanite Thought Matrix computers
esc_special_projects.3002.name: "Nanite Thought Matrix Development"
esc_special_projects.3002.desc: "Our advances in nanotechnology and artificial intelligence have led some researchers to propose an entirely new class of AI built on a nanite substrate, capable of mimicking organic cognition with extraordinary fidelity. The navy has already expressed interest in sponsoring the research for fleet command applications."
esc_special_projects.3002.option.a: "Give researchers a go ahead"
esc_special_projects.3002.option.b: "We have no need of such technology!"

ESC_NANITE_THOUGHT_MATRIX_DEVELOP: "Nanite Thought Matrix Development"
ESC_NANITE_THOUGHT_MATRIX_DEVELOP_DESC: "Theoretical models suggest that an AI built on a nanite substrate could perfectly replicate organic thought processes while retaining the speed and precision of a machine. The admiralty sees tremendous potential for space warfare, convinced it would grant our ships a decisive edge over fleets still relying on conventional AI."

esc_special_projects.3003.name: "Intact Tempest Ship Recovered"
esc_special_projects.3003.desc: "A mostly-intact Gray Tempest vessel has been recovered from a recent engagement. Preliminary analysis reveals its controlling AI runs on a nanite substrate, configured to emulate the mind of some long-extinct species. Our scientists believe this technology can be reverse-engineered and adapted to dramatically improve our own ships' combat capabilities."
esc_special_projects.3003.option.a: "Give researchers a go ahead"
esc_special_projects.3003.option.b: "We have no need of such technology!"

ESC_NANITE_THOUGHT_MATRIX_RENGINEER: "Nanite Thought Matrix Reverse Engineering"
ESC_NANITE_THOUGHT_MATRIX_RENGINEER_DESC: "The recovered Tempest vessel houses an advanced AI built on a nanite substrate, emulating the cognition of a long-extinct species. Having seen these ships in action, we mean to claim this technology for ourselves."

esc_special_projects.3004.name: "Nanite Thought Matrix"
esc_special_projects.3004.desc: "Our researchers have succeeded in creating a nanite-based AI that perfectly replicates organic cognition. An entirely new frontier of technological development now lies open before us."

### Gigapredator Instincts computers
esc_special_projects.4002.name: "Gigapredator Study: Suggestion"
esc_special_projects.4002.desc: "We have encountered spaceborne lifeforms of staggering size and ferocity, creatures that must rely on extraordinary physiological adaptations to survive in the void. If we can study and replicate those adaptations, far more powerful phenotypes of our own warbeasts may become possible."
esc_special_projects.4002.option.a: "We will learn what we can"
esc_special_projects.4002.option.b: "We don't want our warbeasts to turn on us!"

ESC_GIGAPREDATOR_STUDY: "Gigapredator Study"
ESC_GIGAPREDATOR_STUDY_DESC: "Spaceborne leviathans thrive in regions where no creature of their mass should survive, sustained by biological adaptations we barely understand. Studying these adaptations could teach us to forge far more powerful warbeasts of our own."

esc_special_projects.4003.name: "Gigapredator Study: Report"
esc_special_projects.4003.desc: "Our researchers have uncovered key secrets behind the leviathans' survival in the void, and are confident this knowledge can be applied to our own warbeasts, producing stronger and smarter phenotypes that will greatly increase the power of our fleets."

