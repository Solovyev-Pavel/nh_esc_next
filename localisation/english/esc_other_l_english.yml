esc_events.2000.title: "Ether Drake Takes Flight!"
esc_events.2000.desc: "The cloning was a success. A young Ether Drake hatchling has emerged, surprisingly docile in the presence of our scientists, and already possessing considerable power that can be directed toward our cause."

esc_events.2002.title: "Sky Dragon Takes Flight!"
esc_events.2002.desc: "The cloning was a success. A young Sky Dragon hatchling has emerged, surprisingly docile around our scientists, and already formidable enough to serve our cause."

esc_events.3011.name: "Mineral Riches"
esc_events.3011.desc: "Miners on §Y[Root.GetName]§! have struck an exceptionally rich vein of £minerals£ §Y$minerals$§! deep within the planet's mantle, promising a substantial boost to local resource output."

esc_events.3012.name: "Molten Alloys"
esc_events.3012.desc: "Mantle mining operations on §Y[Root.GetName]§! have uncovered a plume of molten £alloys£ §Y$alloys$§! surging up from the planet's core. With minor adjustments to the extraction process, the Mantle Mining Facility can tap this bounty."

esc_events.3013.name: "Exotic Gases Pocket"
esc_events.3013.desc: "Miners on §Y[Root.GetName]§! have discovered a pressurized pocket of £exotic_gases£ §Y$exotic_gases$§! trapped within the mantle, ripe for extraction by the Mantle Mining Facility."

esc_events.3014.name: "Crystalline Gift"
esc_events.3014.desc: "Miners on §Y[Root.GetName]§! have found sprawling clusters of £rare_crystals£ §Y$rare_crystals$§! embedded within the planet's mantle, a discovery that promises to enrich the local economy considerably."

esc_events.3015.name: "Molten Motes"
esc_events.3015.desc: "Miners on §Y[Root.GetName]§! have found significant quantities of £volatile_motes£ §Y$volatile_motes$§! dissolved within the mantle's molten rock, a valuable find the Mantle Mining Facility can now exploit."

esc_events.3016.name: "Crystalline Pretties"
esc_events.3016.desc: "Miners on §Y[Root.GetName]§! have discovered crystalline clusters of no industrial worth within the planet's mantle, but the luxury market craves them. Extracting these crystals with the Mantle Mining Facility should yield handsome £trade_value£ §Y$trade$§!."

esc_events.3017.name: "Living Metals"
esc_events.3017.desc: "Miners on §Y[Root.GetName]§! report a strange discovery in the planet's mantle, a formation of molten metal that behaves like a simple living organism. With modifications to the Mantle Mining Facility's equipment, this £sr_living_metal£ §Y$sr_living_metal$§! can be studied and small quantities extracted for industrial use."

esc_events.3051.name: "Immanis Colosseus"
esc_events.3051.desc: "The Mantle Mining Facility on §Y[Root.GetName]§! has unearthed something extraordinary. A corpse of a lifeform of almost incomprehensible scale, suspended within the planet's mantle and somehow preserved despite the crushing pressure and searing heat.\n\nInitial surveys place the creature at roughly 250 kilometers across and at least 20 kilometers thick. How such a being sustained itself remains unknown, though the leading theory suggests it metabolized fossil fuels from the planet's crust.\n\nThe creature appears to have perished approximately 150,000 years ago, sinking slowly into the mantle ever since. An expedition into its interior revealed a fading but still-living internal biosphere, populated by organisms that bear no resemblance to surface life, their lineages seemingly separated millions of years ago.\n\nFurther study is imperative."

