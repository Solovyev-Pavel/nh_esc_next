ESC_BIO_REPAIR_DRONES: "Healing Enzyme Symbionts"
ESC_BIO_REPAIR_DRONES_DESC: "A colony of small symbiotes dwelling in the warbeast's outer tissue layers. Their specialized enzymes accelerate wound healing far beyond what the creature's own biology can manage."

ESC_ADV_SHIELD_CAPACITOR: "Advanced Shield Capacitors"
ESC_ADV_SHIELD_CAPACITOR_DESC: "Higher-capacity shield banks that store more charge per cycle than previous models, substantially boosting effective shield strength."

ESC_BLUE_CRYSTAL_CAPACITOR: "Crystal-Infused Shield Capacitor"
ESC_BLUE_CRYSTAL_CAPACITOR_DESC: "Crystalline materials infused into these capacitors reinforce hull integrity alongside shield strength, pulling double duty from a single component."

ESC_RED_CRYSTAL_CAPACITOR: "Crystal-Forged Shield Capacitor"
ESC_RED_CRYSTAL_CAPACITOR_DESC: "Crystalline supplements woven through the capacitor substrate reinforce hull integrity in addition to boosting shield strength. The combination outperforms either material on its own."

ESC_STELLARITE_POWER_CORE: "Stellarite Power Core"
ESC_STELLARITE_POWER_CORE_DESC: "Reverse-engineered from the process that once fueled the Stellarite Devourer, this miniature artificial star feeds supplementary energy directly into the ship's weapons, boosting both output and rate of fire."

ESC_STANDARDIZED_WARHEADS: "Standardized Warheads"
ESC_STANDARDIZED_WARHEADS_DESC: "Common-specification warheads designed to fit any explosive weapon platform. Interchangeability reduces reload time, and standardized storage improves munitions safety."

ESC_BIO_STANDARDIZED_WARHEADS: "Compartmentalized Volatiles Sacks"
ESC_BIO_STANDARDIZED_WARHEADS_DESC: "An evolved internal architecture that segments the creature's volatile sacks into isolated compartments. Any accidental rupture stays contained, and biological projectiles regenerate faster."

ESC_TEMPORAL_DISPLACER: "Temporal Displacer"
ESC_TEMPORAL_DISPLACER_DESC: "A compact device of obscure origins that bends spacetime in localized ways. Its exact mechanisms are unclear, but ships equipped with it survive engagements they have no right to."

