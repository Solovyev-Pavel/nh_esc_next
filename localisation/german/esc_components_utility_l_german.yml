ESC_BIO_REACTOR_BOOSTER_3_DESC: "$REACTOR_BOOSTER_3_DESC$"

ESC_REACTOR_BOOSTER_4: "Auxiliary Zero-Point Reactor"
ESC_REACTOR_BOOSTER_4_DESC: "A secondary zero-point reactor that augments the ship's primary power grid, picking up the slack when the main reactor cannot meet demand on its own."

ESC_BIO_REACTOR_BOOSTER_4: "Auxiliary Zero-Point Metabolism Nodule"
ESC_BIO_REACTOR_BOOSTER_4_DESC: "A cluster of supplementary organs adapted to harvest zero-point energy, feeding additional power into the creature's systems when its own biology falls short."

ESC_REACTOR_BOOSTER_5: "Auxiliary Singularity Reactor"
ESC_REACTOR_BOOSTER_5_DESC: "A secondary singularity reactor operating in parallel with the main power system. Even under heavy load, the ship's most demanding systems never go hungry."

ESC_BIO_REACTOR_BOOSTER_5: "Auxiliary Singularity Metabolism Nodule"
ESC_BIO_REACTOR_BOOSTER_5_DESC: "Auxiliary organs paired with the creature's primary singularity harvesters, drawing additional power from the same source to sustain what the main biological system alone cannot."

ESC_STRUCTURAL_REINFORCEMENT: "Structural Reinforcement"
ESC_STRUCTURAL_REINFORCEMENT_DESC: "Additional layers of armored material bonded to the hull, spreading impact loads across a wider area instead of letting them concentrate at vulnerable points."

ESC_ADV_AUX_FIRE_CONTROL: "Advanced Fire Control Systems"
ESC_ADV_AUX_FIRE_CONTROL_DESC: "A dedicated fire control processor that generates firing solutions of exceptional precision, extending the effective range and accuracy of the ship's weapons well beyond normal parameters."

ESC_BIO_AUX_FIRE_CONTROL: "Combat Synapses"
ESC_BIO_AUX_FIRE_CONTROL_DESC: "Dedicated neural pathways specialized for combat analysis, feeding continuous targeting corrections to the creature's weapon organs. Accuracy and threat prioritization improve across the board."

ESC_BIO_ADV_AUX_FIRE_CONTROL: "Evolved Combat Synapses"
ESC_BIO_ADV_AUX_FIRE_CONTROL_DESC: "A more elaborate neural architecture built on the original combat synapses, processing combat data with enough speed and depth to sharpen the creature's aim even in the most chaotic engagements."

ESC_PSIONIC_REINFORCEMENT: "Psionic Reinforcement"
ESC_PSIONIC_REINFORCEMENT_DESC: "This device channels the crew's psionic potential outward as a protective field, strengthening shields and hull alike through the collective force of minds bent on a single purpose."

ESC_PRECURSOR_ARMS_ENHANCER: "Precursor Armaments Enhancer"
ESC_PRECURSOR_ARMS_ENHANCER_DESC: "A dark-matter reactor built to precursor specifications, intended to boost weapons output. Its age has done nothing to diminish its effectiveness."

ESC_NANITE_ARMOR_HARDENER: "Nanite Reactive Armor"
ESC_NANITE_ARMOR_HARDENER_DESC: "Nanites embedded in this reactive armor continuously reshape its molecular structure in response to incoming attacks, dissipating and absorbing energy with an efficiency that passive armor cannot approach."

ESC_SHIELD_HARDENER_3: "Citadel Shield Hardener"
ESC_SHIELD_HARDENER_3_DESC: "A specialized generator that greatly increases shield field density, closing the gaps in conventional shield geometry that certain weapons are designed to exploit."

ESC_ARMOR_HARDENER_LMETAL_2: "Living Absorption Plates"
ESC_ARMOR_HARDENER_LMETAL_2_DESC: "A refined living metal reactive armor that intercepts a broader range of incoming attacks than its predecessor, while also adding some baseline strength to the armor layer."

ESC_SHIELD_HARDENER_PSI_2: "Shroud-Enhanced Shield Hardener"
ESC_SHIELD_HARDENER_PSI_2_DESC: "Psionic energy drawn directly from the Shroud pours through this device into the ship's shields, hardening them against attacks that would normally pass through. Any excess energy reinforces baseline shield strength."

mod_esc_damage_enemy_ship_on_death: "Upon death, inflict a percentage of this ship's hull and armor as damage to a nearby enemy"

ESC_AUX_DEAD_HAND_KILL_CMD_1: "Dead Hand Switch: Kill Command"
ESC_AUX_DEAD_HAND_KILL_CMD_1_DESC: "Should the ship sustain critical damage, self-destruct protocols engage automatically. Crew casualties are likely, but the resulting detonation may take at least one enemy ship with it."

ESC_BIO_AUX_DEAD_HAND_KILL_CMD_1: "Catalytic Bladder"
ESC_BIO_AUX_DEAD_HAND_KILL_CMD_1_DESC: "Sacks of highly volatile material distributed across the creature's interior will rupture upon death, releasing enough energy to threaten any enemy ships within range."

ESC_AUX_DEAD_HAND_KILL_CMD_2: "Dead Hand Switch: Annihilate Command"
ESC_AUX_DEAD_HAND_KILL_CMD_2_DESC: "Should the ship sustain critical damage, a full self-destruct sequence drives the power core to catastrophic overload. No crew will survive, but the explosion can cripple or destroy multiple enemy vessels."

ESC_BIO_AUX_DEAD_HAND_KILL_CMD_2: "Volatile Catalytic Bladder"
ESC_BIO_AUX_DEAD_HAND_KILL_CMD_2_DESC: "Greatly enlarged sacks of extremely volatile compounds distributed throughout the creature's body will detonate upon death with enough force to engulf everything nearby."

mod_esc_repair_allied_ship_on_death: "Upon death, a random allied ship in the fleet regains a portion of Hull and Armor"

ESC_AUX_DEAD_HAND_HEAL_CMD_1: "Dead Hand Switch: Repair Allies Command"
ESC_AUX_DEAD_HAND_HEAL_CMD_1_DESC: "Should the ship sustain critical damage, its repair drones are automatically redirected to the nearest allied vessels. The loss of a ship is tragic, but its sacrifice may give others the margin they need to survive the engagement."

ESC_BIO_AUX_DEAD_HAND_HEAL_CMD_1: "Restorative Enzyme Sacks"
ESC_BIO_AUX_DEAD_HAND_HEAL_CMD_1_DESC: "Enzyme-filled sacks across the creature's outer carapace rupture upon death, dispersing restorative compounds that accelerate regeneration in any allied creatures close enough to benefit."

ESC_AUX_DEAD_HAND_HEAL_CMD_2: "Dead Hand Switch: Support Allies Command"
ESC_AUX_DEAD_HAND_HEAL_CMD_2_DESC: "Should the ship sustain critical damage, every available repair drone and salvageable material is directed outward to allied vessels. The loss of a ship is tragic, but its sacrifice may give others the margin they need to survive the engagement."

ESC_BIO_AUX_DEAD_HAND_HEAL_CMD_2: "Supreme Restorative Enzyme Sacks"
ESC_BIO_AUX_DEAD_HAND_HEAL_CMD_2_DESC: "More potent enzyme sacks than the standard variant, distributed across the outer carapace. Upon the creature's death, they disperse with enough restorative output to accelerate healing in several nearby allies at once."

