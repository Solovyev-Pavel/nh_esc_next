ESC_BIO_TEMPORAL_DISPLACER_DESC: "A compact device of obscure origins integrated into the warbeast's biology, bending spacetime in subtle ways. Creatures fitted with it walk away from engagements they should not survive."

ESC_AFTERBURNER_3: "Pulsed Plasma Afterburners"
ESC_AFTERBURNER_3_DESC: "High-output plasma afterburners built for combat maneuvering. The extra speed and agility can mean the difference between dodging a volley and eating one."

ESC_BIO_AFTERBURNER_1: "Simple Maneuvering Tentacles"
ESC_BIO_AFTERBURNER_1_DESC: "Supplementary tentacles that augment the creature's existing propulsion, making it more responsive to directional changes in combat."

ESC_BIO_AFTERBURNER_2: "Maneuvering Tentacles"
ESC_BIO_AFTERBURNER_2_DESC: "A stronger strain of maneuvering tentacles, capable of rapid course corrections and speed changes that the basic variant cannot match."

ESC_BIO_AFTERBURNER_3: "Evolved Maneuvering Tentacles"
ESC_BIO_AFTERBURNER_3_DESC: "The most capable strain of maneuvering tentacle yet produced, with the strength and reaction time to redirect the creature almost instantaneously in any direction."

ESC_AUX_THRUSTERS: "Auxiliary Maneuver Thrusters"
ESC_AUX_THRUSTERS_DESC: "Supplementary thrusters added to the reaction control system, improving overall maneuverability and giving the crew more options for avoiding incoming fire."

ESC_BIO_REACTOR_BOOSTER_1: "$REACTOR_BOOSTER_1$"
ESC_BIO_REACTOR_BOOSTER_1_DESC: "$REACTOR_BOOSTER_1_DESC$"

ESC_BIO_REACTOR_BOOSTER_2: "$REACTOR_BOOSTER_2$"
ESC_BIO_REACTOR_BOOSTER_2_DESC: "$REACTOR_BOOSTER_2_DESC$"

