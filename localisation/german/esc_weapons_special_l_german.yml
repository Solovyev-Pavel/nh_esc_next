###                  Biological Weapons                  ###
############################################################

# Bile Spitter
ESC_BIO_CANNON_1: "Bile Spitter"
ESC_BIO_CANNON_1_DESC: "This engineered organism, when stimulated, forcibly expels a corrosive bile mass with the velocity of a cannon round."
SMALL_ESC_BIO_CANNON_1: "$esc_small$ $ESC_BIO_CANNON_1$"
SMALL_ESC_BIO_CANNON_1_DESC: "$ESC_BIO_CANNON_1_DESC$"
MEDIUM_ESC_BIO_CANNON_1: "$esc_medium$ $ESC_BIO_CANNON_1$"
MEDIUM_ESC_BIO_CANNON_1_DESC: "$ESC_BIO_CANNON_1_DESC$"
LARGE_ESC_BIO_CANNON_1: "$esc_large$ $ESC_BIO_CANNON_1$"
LARGE_ESC_BIO_CANNON_1_DESC: "$ESC_BIO_CANNON_1_DESC$"

# Vile Bile Spitter
ESC_BIO_CANNON_2: "Vile Bile Spitter"
ESC_BIO_CANNON_2_DESC: "A selected mutation of the Bile Spitter strain with markedly improved acid production, capable of inflicting noticeably greater corrosive damage."
SMALL_ESC_BIO_CANNON_2: "$esc_small$ $ESC_BIO_CANNON_2$"
SMALL_ESC_BIO_CANNON_2_DESC: "$ESC_BIO_CANNON_2_DESC$"
MEDIUM_ESC_BIO_CANNON_2: "$esc_medium$ $ESC_BIO_CANNON_2$"
MEDIUM_ESC_BIO_CANNON_2_DESC: "$ESC_BIO_CANNON_2_DESC$"
LARGE_ESC_BIO_CANNON_2: "$esc_large$ $ESC_BIO_CANNON_2$"
LARGE_ESC_BIO_CANNON_2_DESC: "$ESC_BIO_CANNON_2_DESC$"

# Acid Spitter
ESC_BIO_CANNON_3: "Acid Spitter"
ESC_BIO_CANNON_3_DESC: "Bred from Bile Spitters through directed selection, Acid Spitters generate a substantially more caustic compound that dissolves through even reinforced alloys."
SMALL_ESC_BIO_CANNON_3: "$esc_small$ $ESC_BIO_CANNON_3$"
SMALL_ESC_BIO_CANNON_3_DESC: "$ESC_BIO_CANNON_3_DESC$"
MEDIUM_ESC_BIO_CANNON_3: "$esc_medium$ $ESC_BIO_CANNON_3$"
MEDIUM_ESC_BIO_CANNON_3_DESC: "$ESC_BIO_CANNON_3_DESC$"
LARGE_ESC_BIO_CANNON_3: "$esc_large$ $ESC_BIO_CANNON_3$"
LARGE_ESC_BIO_CANNON_3_DESC: "$ESC_BIO_CANNON_3_DESC$"

# Acid Erucator
ESC_BIO_CANNON_4: "Acid Erucator"
ESC_BIO_CANNON_4_DESC: "Selective pressure refined this strain's secretory glands and launch musculature alike, producing blobs of stronger acid at velocities that compete with conventional artillery."
SMALL_ESC_BIO_CANNON_4: "$esc_small$ $ESC_BIO_CANNON_4$"
SMALL_ESC_BIO_CANNON_4_DESC: "$ESC_BIO_CANNON_4_DESC$"
MEDIUM_ESC_BIO_CANNON_4: "$esc_medium$ $ESC_BIO_CANNON_4$"
MEDIUM_ESC_BIO_CANNON_4_DESC: "$ESC_BIO_CANNON_4_DESC$"
LARGE_ESC_BIO_CANNON_4: "$esc_large$ $ESC_BIO_CANNON_4$"
LARGE_ESC_BIO_CANNON_4_DESC: "$ESC_BIO_CANNON_4_DESC$"

# Acid Blob Bomb
ESC_BIO_MISSILE_1: "Acid Blob Bomb"
ESC_BIO_MISSILE_1_DESC: "A larger engineered organism whose glands produce voluminous, adhesive masses of acidic bile, launched ballistically at enemy vessels with reasonable accuracy."

# Vile Acid Blob Bomb
ESC_BIO_MISSILE_2: "Vile Acid Blob Bomb"
ESC_BIO_MISSILE_2_DESC: "A more robust strain of the Acid Blob Bomb lineage, producing larger projectile masses with a more aggressively corrosive chemical composition."

# Devouring Acid Blob Bomb
ESC_BIO_MISSILE_3: "Devouring Acid Blob Bomb"
ESC_BIO_MISSILE_3_DESC: "The finest expression of the Acid Blob Bomb lineage, these organisms generate and launch acid masses with a volume and corrosivity that no earlier strain approaches."

# Acid Blob Barrage
ESC_BIO_X_MISSILE_1: "Acid Blob Barrage"
ESC_BIO_X_MISSILE_1_DESC: "An enlarged derivation of the Acid Blob Bomb spitter capable of launching repeated acid masses in rapid sequence, though its sheer scale confines it to the largest vessels."

# Devouring Acid Blob Barrage
ESC_BIO_X_MISSILE_2: "Devouring Acid Blob Barrage"
ESC_BIO_X_MISSILE_2_DESC: "A further mutation of the Acid Blob Barrage spitter that generates more projectile masses of even greater potency, saturating targets with corrosive fire."

# Acid Blob Storm
ESC_BIO_X_MISSILE_3_TITAN: "Acid Blob Storm"
ESC_BIO_X_MISSILE_3_TITAN_DESC: "Developed from the Acid Blob Barrage lineage to its absolute extreme, this gargantuan organism launches acid masses with a volume and ferocity that rivals the heaviest conventional ordnance."
ESC_BIO_X_MISSILE_3_JUGGERNAUT: "$ESC_BIO_X_MISSILE_3_TITAN$ ($juggernaut$)"
ESC_BIO_X_MISSILE_3_JUGGERNAUT_DESC: "$ESC_BIO_X_MISSILE_3_TITAN_DESC$"

