# Crystal Javelin Thrower
ESC_CRYSTAL_LANCE_1: "Crystal Javelin Thrower"
ESC_CRYSTAL_LANCE_1_DESC: "A spinal-mounted weapon that concentrates the full length of the ship's frame into a single crystalline lance discharge of formidable power and accuracy."

# Crystal Javelin Cannon
ESC_CRYSTAL_LANCE_2: "Crystal Javelin Cannon"
ESC_CRYSTAL_LANCE_2_DESC: "Scaled to serve as the primary armament of capital warships, this weapon projects crystalline lances of sufficient density to penetrate even heavy armor plating."

# Crystal Lance Cannon
ESC_CRYSTAL_LANCE_3: "Crystal Lance Cannon"
ESC_CRYSTAL_LANCE_3_DESC: "Through refined crystalline geometry and improved focusing, this successor to the Crystal Javelin Cannon achieves substantially greater penetration and damage."

# Crystalline Impaler
ESC_CRYSTAL_LANCE_TITANIC: "Crystalline Impaler"
ESC_CRYSTAL_LANCE_TITANIC_DESC: "Engineered to the colossal scale that only titanic-class vessels can support, this weapon delivers lance strikes of such magnitude that lighter vessels rarely survive more than one or two direct hits."
