# Juggernaut Point Defense System
ESC_JUGGERNAUT_POINT_DEFENSE_1: "Juggernaut Point Defense System"
ESC_JUGGERNAUT_POINT_DEFENSE_1_DESC: "Engineered for the Juggernaut's unique scale and power availability, this point-defense system provides interception coverage that no standard vessel's defensive batteries could match."

ESC_BIO_JUGGERNAUT_POINT_DEFENSE_1: "Juggernaut Snapper Gun"
ESC_BIO_JUGGERNAUT_POINT_DEFENSE_1_DESC: "Selectively bred for the enormous biological resources available on Juggernaut-class warbeasts, this close-in weapon system provides interception coverage at scales that smaller creatures could not sustain."

# Improved Juggernaut Point Defense System
ESC_JUGGERNAUT_POINT_DEFENSE_2: "Improved Juggernaut Point Defense System"
ESC_JUGGERNAUT_POINT_DEFENSE_2_DESC: "A refined tracking system and upgraded cannon arrays push the Juggernaut point-defense installation to a new level of interception performance, reducing the chance that anything gets through to negligible levels."

ESC_BIO_JUGGERNAUT_POINT_DEFENSE_2: "Evolved Juggernaut Snapper Gun"
ESC_BIO_JUGGERNAUT_POINT_DEFENSE_2_DESC: "A more advanced neural cluster and more sensitive sensory organs give this evolved Juggernaut Snapper Gun interception accuracy and reaction speed that its ancestors could not achieve, leaving very little room for anything to pass uncontested."

# Lightstorm Point-Defense
ESC_LIGHTSTORM_PD: "Lightstorm Point-Defense"
ESC_LIGHTSTORM_PD_DESC: "Laser-based point-defense systems respond at the speed of light rather than the speed of projectiles, and this exceptionally efficient design maximizes that advantage with targeting systems that almost never miss."

ESC_BIO_LIGHTSTORM_PD: "Fierce Glare Beam Projector"
ESC_BIO_LIGHTSTORM_PD_DESC: "Neural clusters and sensory organs grafted from snapper gun lineages transform the eyebeam projector into something qualitatively different: a biological beam-based close-in weapon system of remarkable speed and precision."

