ESC_FIGHTERS_HANGAR_5: "Siegebreaker Fighter Wing"
ESC_FIGHTERS_HANGAR_5_DESC: "Interceptors of such exceptional capability that their arrival in a battle is often decisive, reversing disadvantageous situations through sheer performance advantage over anything opposing them."

