# Iron Curtain Point-Defense
ESC_POINT_DEFENSE_5: "Iron Curtain Point-Defense"
ESC_POINT_DEFENSE_5_DESC: "The most capable point-defense system that current technology permits, combining tracking speed, interception rate, and reaction time in a configuration that approaches the theoretical maximum of what is possible."

