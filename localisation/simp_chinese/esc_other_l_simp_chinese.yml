 sm_esc_arkship_hardlight_armor: "硬光装甲覆层"
 sm_esc_arkship_hardlight_armor_desc: "在击败了强大的幽魂之后，我们洞悉了创造硬光的奥秘。用这种新型“材料”打造的装甲覆层，将赋予方舟舰星海中前所未见的防御能力。\n"
 sm_esc_arkship_horror_armor: "位面之魇装甲覆层"
 sm_esc_arkship_horror_armor_desc: "在击败了曾经试图入侵此星系的强大位面之魇之后，我们现在掌握了不属于这个世界的材料知识。通过安装基于那异常坚韧的表皮——来自这头现已死去的太空巨兽——所制成的装甲板，我们将确保方舟舰即使在星际虚空中遭遇最险恶的冲突，也能幸存下来。\n"
 sm_esc_arkship_cyclonic_shields: "旋风盾发生器阵列"
 sm_esc_arkship_cyclonic_shields_desc: "方舟舰对我们文明的重要性怎么强调都不为过。我们必须尽己所能，确保它们能够持续存续。有了旋风护盾发生器，我们的方舟舰将得到周全保护，足以抵御我们在穿越黑暗太虚的旅途中所可能遭遇的任何威胁。\n"
 sm_esc_arkship_dark_matter_shields: "暗物质护盾发生器阵列"
 sm_esc_arkship_dark_matter_shields_desc: "在研究了先驱者的技术之后，我们开发了自己的护盾，利用暗物质在舰船周围生成近乎无法穿透的屏障。而通过将这些暗物质护盾安装到我们的方舟舰上，我们将确保它们即使在星际虚空中遭遇最险恶的冲突，也能幸存下来。\n"
 sm_esc_arkship_hangar_bay_advanced: "高等舰载机库"
 sm_esc_arkship_hangar_bay_advanced_desc: "随着新一代战机入役，我们最优秀、能力最强的机型必须被投入保护方舟舰这一最重要的重任。\n"
