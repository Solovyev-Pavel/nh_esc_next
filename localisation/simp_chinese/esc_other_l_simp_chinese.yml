 d_esc_mantle_mineral_cluster: "矿物集群"
 d_esc_mantle_mineral_cluster_desc: "位于行星地幔中的高品质矿物集群，可供幔层开采设施进行开采。"
 d_esc_mantle_alloy_plume: "合金流"
 d_esc_mantle_alloy_plume_desc: "一团从行星核心涌向上地幔的熔融合金流，可供幔层开采设施进行开采。"
 d_esc_mantle_exotic_gases_pocket: "异星天然气富集区"
 d_esc_mantle_exotic_gases_pocket_desc: "一处位于行星地幔上层的异星天然气富集区，可由幔层开采设施进行提取。"
 d_esc_mantle_rare_crystal_cluster: "稀有水晶集群"
 d_esc_mantle_rare_crystal_cluster_desc: "位于行星地幔内的大型稀有晶体集群，可由幔层开采设施进行开采。"
 d_esc_mantle_volatile_motes_cluster: "易爆微粒"
 d_esc_mantle_volatile_motes_cluster_desc: "位于行星上地幔中的熔融易爆微粒富集区，可由幔层开采设施进行提取。"
 d_esc_mantle_trade_value: "美丽的晶体"
 d_esc_mantle_trade_value_desc: "一组位于行星上地幔中的晶体集群，可由幔层开采设施进行开采。这些晶体几乎无法用于工业，市场对其制成的奢侈品却需求日增。"
 d_esc_mantle_living_metal: "活体金属流"
 d_esc_mantle_living_metal_desc: "这股奇特的熔融金属流展现出了类似于简单生命体的特征。或许，这种“活体金属”可用于创造出具有独特性质的新型材料。"
 d_esc_mantle_immanis_colosseus: "巨物死骸"
 d_esc_mantle_immanis_colosseus_desc: "一具巨大生物的遗骸漂浮在行星的上地幔中。对其展开研究，将极大推动我们对生命，以及生命之极限的理解。"
 esc_events.3011.name: "富矿"
 esc_events.3011.desc: "§Y[Root.GetName]§!的矿工报告称，在该行星地幔中发现了一处异常珍贵的£minerals£§Y$minerals$§!集群。开采这些矿物将显著提升当地的资源产能，对我们的帝国大有裨益。"
 esc_events.3012.name: "熔融合金"
 esc_events.3012.desc: "§Y[Root.GetName]§!的矿工报告称，他们在进行地幔采矿作业时，探测到一股从行星核心涌出的熔融£alloys£§Y$alloys$§!流。只需对常规开采流程稍作调整，幔层开采设施便可收集这些合金，为帝国带来效益。"
 esc_events.3013.name: "异星天然气富集区"
 esc_events.3013.desc: "§Y[Root.GetName]§!的矿工报告称，在地幔中发现了一处£exotic_gases£§Y$exotic_gases$§!富集区，可通过幔层开采设施进行开发。这将为帝国带来大量收益。"
 esc_events.3014.name: "水晶馈赠"
 esc_events.3014.desc: "§Y[Root.GetName]§!的矿工报告称，在该行星地幔中发现了多处价值巨大的£rare_crystals£§Y$rare_crystals$§!矿群，可通过幔层开采设施进行开采。这一发现将极大促进当地经济发展。"
 esc_events.3015.name: "易爆微粒"
 esc_events.3015.desc: "§Y[Root.GetName]§!的矿工报告称，他们发现行星地幔的熔岩中有大量溶解的£volatile_motes£§Y$volatile_motes$§!。幔层开采设施可以开发这些珍贵的资源，使其为帝国所用。"
 esc_events.3016.name: "美丽的晶体"
 esc_events.3016.desc: "§Y[Root.GetName]§!的矿工报告称，在行星地幔中发现了一组晶体集群。尽管这些水晶几乎不具备工业用途，由其镶嵌而成的奢侈品却需求渐增。幔层开采设施可以采掘这些水晶，并为我们带来丰厚的£trade_value£§Y$trade$§!。"
 esc_events.3017.name: "活体金属"
 esc_events.3017.desc: "§Y[Root.GetName]§!的矿工报告称，在行星地幔中发现了一种奇特的熔融金属沉积物——它表现出了类似简单生命体的特性。通过对幔层开采设施稍加改造，我们便可利用其设备观察并研究这种£sr_living_metal£§Y$sr_living_metal$§!，同时还能小批量提取该类物质以应用于工业生产。"
 esc_events.3051.name: "巨物"
 esc_events.3051.desc: "§Y[Root.GetName]§!的幔层开采设施报告了作业期间的一项惊人发现。他们遇到了一具漂浮于地幔中的遗骸，属于一个我们前所未见的庞然大物。尽管周围有着巨大的压力与高温，它的形态依然大体完整。\n\n初步研究显示，这一巨兽的身长约为250公里，宽度至少有20公里。我们尚不清楚如此庞大的生物如何维持生存，但主流理论认为，它曾通过代谢行星地壳中的化石燃料获取能量。\n\n科研人员推测，该生物大约于15万年前因未知原因死亡，此后便缓慢沉入行星地幔。对其内部的勘探表明，该生物体内的“生物圈”依然存在微弱的生机。死亡巨兽体内发现的生命形式，与地表的任何物种都毫无相似之处，这让我们相信它们的谱系早在数百万年前就已分离，这也带来了更多关于巨兽之基本特征的疑问。\n\n我们必须对该生物展开深入研究。"
