 sm_esc_arkship_amoeba_hangar_bay_advanced: "基因工程变形虫机库"
 sm_esc_arkship_amoeba_hangar_bay_advanced_desc: "经由基因修饰孕育的变形虫范例，其战斗能力已绝对超越了该物种任何自然个体所能企及的水平。这些变形虫中最强大、最忠诚的群体，应当被指派去保护我们的方舟舰。\n"
