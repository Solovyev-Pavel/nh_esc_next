 sm_esc_arkship_advanced_armor: "改良零素装甲镀层"
 sm_esc_arkship_advanced_armor_desc: "方舟舰对我们文明的重要性怎么强调都不为过。我们必须尽己所能，确保方舟舰的持续存续。有了新一代装甲覆层，我们可以放心，只有最猛烈的攻势才可能对它们造成哪怕一丝损伤。\n"
