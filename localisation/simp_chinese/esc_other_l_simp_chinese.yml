 sm_esc_arkship_advanced_psi_shields_desc: "方舟舰对我们文明的重要性怎么强调都不为过。我们必须尽己所能，确保它们能够持续存续。有了新一代灵能护盾发生器，我们的方舟舰将得到周全保护，足以抵御我们在穿越黑暗太虚的旅途中所可能遭遇的任何威胁。\n"
 sm_esc_arkship_crystal_core_armor: "晶核装甲覆层"
 sm_esc_arkship_crystal_core_armor_desc: "方舟舰对我们文明的重要性怎么强调都不为过。我们必须尽己所能，确保方舟舰的持续存续。通过安装这种新型晶核装甲覆层，我们将大幅提升方舟舰的防御能力，确保它们即使在星空中遭遇最险恶的冲突，也能幸存下来。\n"
