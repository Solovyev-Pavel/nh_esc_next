sm_esc_arkship_spinal_arc_shockwave_mount: "Arkship Arc Shockwave Emitter"
sm_esc_arkship_spinal_arc_shockwave_mount_desc: "Our Arkship is our home between the stars and the fortress that protects our people from the horrors of the galaxy. It is only natural that we would arm it with the best weapons devised by our scientists. The Arc Shockwave emitters are an extremely potent weapon that will surely keep ill-wishers well away from our Arkships.\n"
sm_esc_arkship_spinal_dark_matter_shockwave_mount: "Arkship Dark Matter Halo Blast Emitter"
sm_esc_arkship_spinal_dark_matter_shockwave_mount_desc: "Our Arkship is our home between the stars and the fortress that protects our people from the horrors of the galaxy. It is only natural that we would arm it with the best weapons devised by our scientists. And having developed the Dark Matter Halo Blast cannon based the technologies we've studied from the precursor civilization, we have the weapon to ensure no one is foolish enough to approach our Arkships with ill intent.\n"
sm_esc_arkship_spinal_extradimensional_mount: "Arkship Matter Annihilators"
sm_esc_arkship_spinal_extradimensional_mount_desc: "Our Arkship is our home between the stars and the fortress that protects our people from the horrors of the galaxy. It is only natural that we would arm it with the best weapons devised by our scientists. We have defeated invaders from parallel dimension, and now possess the mighty matter annihilators to ensure the safety of our Arkships, at gunpoint.\n"
sm_esc_arkship_spinal_gravitic_cannon_mount: "Arkship Super-Graviton Cannon"
sm_esc_arkship_spinal_gravitic_cannon_mount_desc: "Our Arkship is our home between the stars and the fortress that protects our people from the horrors of the galaxy. It is only natural that we would arm it with the best weapons devised by our scientists. The massive Super-Graviton Cannon an extremely potent weapon that will surely keep ill-wishers well away from our Arkships.\n"
sm_esc_arkship_spinal_mass_accelerator_mount: "Arkship-based Relativistic Kinetic Kill Vehicles"
sm_esc_arkship_spinal_mass_accelerator_mount_desc: "Our Arkship is our home between the stars and the fortress that protects our people from the horrors of the galaxy. It is only natural that we would arm it with the best weapons devised by our scientists. Thus, we should give our Arkships the biggest, meanest gun in our arsenal.\n"
sm_esc_arkship_spinal_autocannon_mount: "Arkship Tempset Autocannon"
sm_esc_arkship_spinal_autocannon_mount_desc: "Our Arkship is our home between the stars and the fortress that protects our people from the horrors of the galaxy. It is only natural that we would arm it with the best weapons devised by our scientists. Thus, we should give our Arkships the biggest, meanest gun in our arsenal.\n"
sm_esc_arkship_spinal_asteroid_thrower_mount: "Arkship Asteroid Thrower"
sm_esc_arkship_spinal_asteroid_thrower_mount_desc: "Our Arkship is our home between the stars and the fortress that protects our people from the horrors of the galaxy. Asteroid throwers are not an overly-complicated weapon, but they are still capable of being devastatingly-powerful. Enough to make anyone think twice before approaching our Arkships with ill intentions.\n"
sm_esc_arkship_spinal_mhd_cannon_mount: "Arkship MagnetoHydroDynamic Cannon"
sm_esc_arkship_spinal_mhd_cannon_mount_desc: "Our Arkship is our home between the stars and the fortress that protects our people from the horrors of the galaxy. It is only natural that we would arm it with the best weapons devised by our scientists. Thus, we should give our Arkships the biggest, meanest gun in our arsenal.\n"
sm_esc_arkship_spinal_enigmatic_mount: "Arkship Enigmatic Energy Lance"
sm_esc_arkship_spinal_enigmatic_mount_desc: "Our Arkship is our home between the stars and the fortress that protects our people from the horrors of the galaxy. It is only natural that we would arm it with the best weapons devised by our scientists. We have solved the eternal riddle of the Enigmatic Fortress and gained access to its incredible technologies. And with those technologies, we've built an energy lance unlike anything this galaxy has seen before.\n"
sm_esc_arkship_spinal_tiyanki_gun_mount: "Arkship Tiyanki Beam Cannon"
sm_esc_arkship_spinal_tiyanki_gun_mount_desc: "Our Arkship is our home between the stars and the fortress that protects our people from the horrors of the galaxy. It is only natural that we would arm it with the best weapons devised by our scientists. After an extensive study of Tiyanki and their mighty Matriarch, we have created a weapon that can mimic their power. A weapon that is perfect for our Arkships.\n"
sm_esc_arkship_spinal_missile_mount: "Arkship Reflext Missile Launchers"
sm_esc_arkship_spinal_missile_mount_desc: "Our Arkship is our home between the stars and the fortress that protects our people from the horrors of the galaxy. It is only natural that we would arm it with the best weapons devised by our scientists. So we shall put the most powerful missile batteries on our Arkship and drive away those who wish harm upon then.\n"
sm_esc_arkship_spinal_nanite_missile_mount: "Arkship Nanite Warhead Missile Launchers"
sm_esc_arkship_spinal_nanite_missile_mount_desc: "Our Arkship is our home between the stars and the fortress that protects our people from the horrors of the galaxy. It is only natural that we would arm it with the best weapons devised by our scientists. So we shall put the most powerful nanite missile batteries on our Arkship and drive away those who wish harm upon then.\n"
sm_esc_arkship_spinal_psi_lance_mount: "Arkship Void Ray"
sm_esc_arkship_spinal_psi_lance_mount_desc: "Our Arkship is our home between the stars and the fortress that protects our people from the horrors of the galaxy. It is only natural that we would arm it with the best weapons devised by our scientists. With our deep understanding of Psionics and the power of our minds, we shall protect our Arkships with the most powerful psionic energy lances this galaxy has seen.\n"
sm_esc_arkship_spinal_psi_shockwave_mount: "Arkship Psionic Shockwave Emitters"
sm_esc_arkship_spinal_psi_shockwave_mount_desc: "Our Arkship is our home between the stars and the fortress that protects our people from the horrors of the galaxy. It is only natural that we would arm it with the best weapons devised by our scientists. With our deep understanding of Psionics and the power of our minds, we shall protect our Arkships with the most powerful psionic weapons this galaxy has seen.\n"
