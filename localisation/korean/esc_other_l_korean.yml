sm_esc_arkship_shielding_armor_desc: "The importance of Arkships for our civilization can't be overstated. And we must do everything in our power to ensure the continued survival of our Arkships. By installing this new shield-generating armor plating, we will significantly increase the defensive capabilities of our Arkships, ensuring it can survive even the most hostile encounters in the interstellar void.\n"
sm_esc_arkship_hardlight_armor: "Hardlight Armor Plating"
sm_esc_arkship_hardlight_armor_desc: "Having defeated the mightly Spectral Wraith, we gained insights into creation of hard light. An armor plating crafted from this new 'material' will grant our Arkships defensive capabilities beyond anything this galaxy has seen ever before.\n"
sm_esc_arkship_horror_armor: "Dimensional Horror Armor Plating"
sm_esc_arkship_horror_armor_desc: "Having defeated the mightly Dimensional Horror that once tried to invade this galaxy, we now possess the knowledge of materials that are out of this world. And by installing armor plating based on the incredibly-tough hide of the now-dead spaceborn leviathan, we will ensure that our Arkships will be to survive even the most hostile encounters in the interstellar void.\n"

sm_esc_arkship_cyclonic_shields: "Cyclonic Shields Generator Arrays"
sm_esc_arkship_cyclonic_shields_desc: "The importance of Arkships for our civilization can't be overstated. And we must do everything in our power to ensure their continued survival. With the cyclonic shield generators, our Arkships will be well-protected from any threats we may encounter on our journey through the dark void of space.\n"
sm_esc_arkship_dark_matter_shields: "Dark Matter Shield Generator Arrays"
sm_esc_arkship_dark_matter_shields_desc: "Having studied precursor technologies, we have developed our own shields that utilize dark matter to create nigh-impenetrable barriers around our ships. And by installing these dark matter shields on our Arkships, we will ensure that they will be to survive even the most hostile encounters in the interstellar void.\n"

