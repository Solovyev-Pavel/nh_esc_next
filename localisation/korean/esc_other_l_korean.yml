# Arkship offensive components : ESC components : standard

sm_esc_arkship_amoeba_hangar_bay_cybernetic: "Cybernetically-Augmented Amoeba Bays"
sm_esc_arkship_amoeba_hangar_bay_cybernetic_desc: "By utilizing extensive cybernetic augmentation, our researchers have managed to create specialized amoebas with incredible combat capabilities and unquestionable loyalty to their handlers. The most powerful and loyal packs of these amoebas should be assigned to protect our Arkships.\n"
sm_esc_arkship_hangar_bay_mercenary: "Mercenary Squadron Hangar Bays"
sm_esc_arkship_hangar_bay_mercenary_desc: "These elite mercenaries have proven their loyalty to more than the next paycheck. They have shown themselves to be loyal to our very people. And for that, we feel they can be assigned the most important job of protecting our Arkships.\n"
sm_esc_arkship_chrono_cannons: "Chrono-Spatial Cannon Batteries"
sm_esc_arkship_chrono_cannons_desc: "The importance of Arkships for our civilization can't be overstated. And we must do everything in our power to ensure the continued survival of our Arkships. With the deadly chrono-spatial cannons, we provide our Arkship with a powerful deterrent weapon to keep those who wish harm upon them far away.\n"
sm_esc_arkship_voidspawn_missile_battery: "Voidspawn Missile Batteries"
sm_esc_arkship_voidspawn_missile_battery_desc: "Our Arkship is our home between the stars and the fortress that protects our people from the horrors of the galaxy. It is only natural that we would arm it with the best weapons devised by our scientists. After an extensive study of the Voidspawn, we have created a weapon that can mimic its deadly power. A weapon that is perfect for our Arkships.\n"
sm_esc_arkship_plasma_missile_battery: "Plasma Missile Batteries"
sm_esc_arkship_plasma_missile_battery_desc: "The importance of Arkships for our civilization can't be overstated. And we must do everything in our power to ensure the continued survival of our Arkships. With the deadly plasma missiles, we will provide our Arkships with a powerful deterrent weapon to keep those who wish harm upon them far away.\n"
sm_esc_arkship_bio_missile_battery: "Acid Blob Bomb Batteries"
sm_esc_arkship_bio_missile_battery_desc: "Our Arkship is our home between the stars and the fortress that protects our people from the horrors of the galaxy. It is only natural that we would arm it with the best weapons devised by our scientists. And the symbiotic creatures capable of launching deadly acid blobs on our command are definitely the weapon we can use to arm our Arkships.\n"
